  transition: border-color var(--t);
}
.field-input:focus, .field-select:focus, .field-textarea:focus { border-color: var(--ink); }
.field-textarea { resize: vertical; min-height: 80px; }

.progress-track { height: 6px; background: var(--ink-10); border-radius: 4px; overflow: hidden; margin-top: 8px; }
.progress-fill { height: 100%; background: var(--ink); border-radius: 4px; transition: width .25s var(--ease); }

.save-status { font-size: 12px; color: var(--ink-30); }

.btn-save:hover { background: #2a2d38; }
.btn-save:disabled { background: var(--ink-30); cursor: not-allowed; }

/* ── Loading / Error ────────────────────────────────────────── */
.loading-state, .error-state {
  text-align: center; padding: 100px 0; color: var(--ink-30); font-size: 14px;
}
.loading-state .spinner {
  width: 24px; height: 24px; border: 2.5px solid var(--ink-10); border-top-color: var(--ink);

}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ──────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px);
  background: var(--ink); color: #fff; font-size: 13px;
  padding: 11px 20px; border-radius: var(--r); white-space: nowrap;
  opacity: 0; pointer-events: none; transition: all .25s var(--ease); z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

async function loadDetail() {
  currentId = getIdFromUrl();
  const wrap = document.getElementById('wrap');

  if (!currentId) {
    wrap.innerHTML = '<div class="error-state">⚠ 網址缺少案件 id 參數（例如 ?id=Q-20260701-123）</div>';
    return;
  }

  try {
    const docSnap = await db.collection('quotes').doc(currentId).get();
    if (!docSnap.exists) {
      wrap.innerHTML = `<div class="error-state">⚠ 找不到案件：${escapeHtml(currentId)}</div>`;
      return;
    }
    currentData = docSnap.data();
    renderDetail();
    renderProjectSection();
  } catch (err) {
    console.error(err);
    wrap.innerHTML = `<div class="error-state">⚠ 讀取失敗：${escapeHtml(err.message || String(err))}</div>`;
  }
}

function fmtDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit' }) +
         ' ' + d.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
}

function fmtPriceRange(q) {
  if (q.priceMid === null || q.priceMid === undefined) return '需評估';
  return `NT$${Number(q.priceMid).toLocaleString()}（${q.priceRange || '—'}）`;
}

// ══════════════════════════════════════════════════
//  PROJECT SCOPE & PROGRESS TRACKING v1
//  Quote → Scope（quotes/{id}/scopes/{scopeId}）→ Task（quotes/{id}/tasks/{taskId}）
//  用 subcollection 儲存，避免單一 quote 文件因 Task 數量增加而無限膨脹；
//  舊報價沒有 project 欄位時完全不受影響（backward compatible）。
// ══════════════════════════════════════════════════

// ── 依報價內容產生預設 Scope 清單（僅在建立專案時執行一次，之後由管理者人工調整）──
function buildDefaultScopeList(q) {
  const list = [];
  const added = new Set();
  function addScope(name, conceptKey, tpl, sourceQuoteItem) {
    if (added.has(conceptKey)) return;
    added.add(conceptKey);
    list.push({ name, tpl, source: 'initial_scope', sourceQuoteItem: sourceQuoteItem || null });
  }

  // 1) 不論網站類型，一律加入的基礎骨架
  UNIVERSAL_BASE_SCOPE.forEach(b => addScope(b.name, b.conceptKey, b.tpl));

  const allNames = [...(q.includedItems || []), ...(q.selectedItems || [])];

  // 2)「基礎電商模組」在報價上是一筆，但在 Scope 上拆成多個獨立項目
  //    （方案已包含、不另計價，但仍然是正式 Scope 的一部分）
  if (allNames.includes('基礎電商模組')) {
    ECOM_BASE_SCOPE_BUNDLE.forEach(b => addScope(b.name, b.conceptKey, b.tpl, '基礎電商模組'));
  }
  if (allNames.includes('後台管理入口')) {
    addScope('後台管理入口', 'admin_login', 'admin_login', '後台管理入口');
  }

  // 3) 其餘方案已包含 + 加選功能，逐一對照 Scope Template（是否計價 ≠ 是否屬於 Scope）
  allNames.forEach(name => {
    const map = SCOPE_TASK_TEMPLATE_MAP[name];
    if (!map) return;
    addScope(name, map.conceptKey, map.tpl, name);
  });

  // 4) 需評估功能：各自產生佔位 Scope，展開後為「需求訪談與技術評估」樣板，
  //    因為這些項目的實際範圍需人工確認後才能定案
  (q.evaluationItems || []).forEach(name => {
    addScope(name, 'eval_' + name, 'evaluate_complex', name);
  });

  return list;
}

// ── 從報價建立專案：寫入 project 欄位 + 產生預設 Scope（不自動展開 Task）──
async function createProjectFromQuote() {
  if (!currentId || !currentData) return;
  if (!confirm('確定要從此報價建立專案嗎？系統會依網站類型與已選功能自動產生預設 Scope，建立後仍可人工新增／修改／刪除。')) return;

  try {
    const scopes = buildDefaultScopeList(currentData);
    const scopeColl = db.collection('quotes').doc(currentId).collection('scopes');
    const batch = db.batch();

    scopes.forEach((s, idx) => {
      const ref = scopeColl.doc();
      batch.set(ref, {
        name: s.name,
        description: '',
        source: s.source,
        crId: null,
        sourceQuoteItem: s.sourceQuoteItem,
        active: true,
        includeInProgress: true,
        order: (idx + 1) * 10,
        taskTemplateKey: s.tpl || null,
        tasksGenerated: false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    });

    batch.update(db.collection('quotes').doc(currentId), {
      project: {
        status: 'planning',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      },
    });

    await batch.commit();
    currentData.project = { status: 'planning' };
    showToast(`✓ 專案已建立，已產生 ${scopes.length} 項預設 Scope`);
    await renderProjectSection();
  } catch (err) {
    console.error(err);
    showToast(`⚠ 建立專案失敗：${err.message || err}`);
  }
}

// ── 載入並渲染專案管理區塊（backward compatible：沒有 project 欄位時顯示建立按鈕）──
// ══════════════════════════════════════════════════
//  一次性 Template Task Migration（僅依 templateTaskKey 精準比對）
//  用途：已經有 templateTaskKey 的既有 Task，套用本次明確的 Template 校正（改名 / 調整 milestone）。
//  與 LEGACY_NAME_ALIASES / resolveLegacyTemplateTaskKey() 用途不同、互不取代：
//  那一套是給「還沒有 templateTaskKey」的舊 Task 在展開 Scope 時做 dedup／補寫 key；
//  這一套是給「已經有 templateTaskKey」的 Task 做一次性欄位校正。
// ══════════════════════════════════════════════════
const TASK_TEMPLATE_MIGRATION_ID = 'task_template_calibration_20260720_v1';

// 只列出「這次要精準更新」的 templateTaskKey → 欄位 patch。
// 只會更新這裡明確列出的欄位，progress/status/weight/order/phase/active/source/crId/
// notes/waitingFor/blockedReason/description 一律不動。
const TASK_TEMPLATE_MIGRATION_PATCH = {
  payment_sandbox:         { name: '金流 Sandbox／測試環境串接' },
  payment_callback:        { requiredByMilestone: 2 },
  payment_order_status:    { requiredByMilestone: 2 },
  payment_production_test: { name: '金流 Production 實單流程測試' },
  launch_adv_06:           { name: 'Production Smoke Test' },
};

// 執行一次性 migration（若尚未執行過）。只依 templateTaskKey 精準識別要更新的 Task；
// 找不到對應 key 的直接跳過，不猜測；templateTaskKey === null（管理者自訂 Task）完全不處理。
async function runTaskTemplateMigrationIfNeeded() {
  const proj = currentData.project || {};
  const migrations = proj.migrations || {};
  if (migrations[TASK_TEMPLATE_MIGRATION_ID]) return; // 已執行過，不重複寫入 Firestore

  const quoteRef = db.collection('quotes').doc(currentId);
  const taskColl = quoteRef.collection('tasks');
  // 使用 dot-notation 路徑做安全的 nested field update，只會寫入這一個 migration key，
  // 不會覆蓋 project 底下其他既有欄位（包含其他未來的 migrations）。
  const markerPatch = {
    [`project.migrations.${TASK_TEMPLATE_MIGRATION_ID}`]: true,
    'project.updatedAt': firebase.firestore.FieldValue.serverTimestamp(),
  };

  try {
    const tasksToPatch = projectTasks.filter(t => t.templateTaskKey && TASK_TEMPLATE_MIGRATION_PATCH[t.templateTaskKey]);

    if (tasksToPatch.length) {
      const batch = db.batch();
      tasksToPatch.forEach(t => {
        const patch = TASK_TEMPLATE_MIGRATION_PATCH[t.templateTaskKey];
        batch.update(taskColl.doc(t.id), {
          ...patch,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        });
      });
      batch.update(quoteRef, markerPatch);
      await batch.commit();

      // 寫入成功後才同步 local state，避免要重新整理頁面才看到新值
      tasksToPatch.forEach(t => Object.assign(t, TASK_TEMPLATE_MIGRATION_PATCH[t.templateTaskKey]));
    } else {
      // 這個 Project 目前沒有符合的 Task，也要留下 marker，避免每次載入都重新掃描
      await quoteRef.update(markerPatch);
    }

    currentData.project = currentData.project || {};
    currentData.project.migrations = currentData.project.migrations || {};
    currentData.project.migrations[TASK_TEMPLATE_MIGRATION_ID] = true;
  } catch (err) {
    // Migration 失敗不影響既有資料正常顯示，僅記錄；下次載入會再嘗試（因為 marker 尚未寫入）
    console.error('Task template migration failed:', err);
  }
}

// ── 進度計算：Σ(Weight×Progress) ÷ Σ(Weight)，僅計入 active 且 includeInProgress 的項目 ──
// ── 防呆：無效 weight（<=0／NaN／Infinity）視為 0（不計入分子分母）；
//    無效 progress 一律 clamp 到 0～100，避免舊資料造成 NaN / Infinity / 超過 100% ──
function safeWeight(t) {
  const w = Number(t.weight);
  return (Number.isFinite(w) && w > 0) ? w : 0;
}
function safeProgress(t) {
  const p = Number(t.progress);
  if (!Number.isFinite(p)) return 0;
  return Math.max(0, Math.min(100, p));
}

function computeProjectMetrics() {
  const scopeById = {};
  projectScopes.forEach(s => { scopeById[s.id] = s; });

  const counted = projectTasks.filter(t => {
    if (t.active === false) return false;
    const scope = scopeById[t.scopeId];
    if (scope && (scope.active === false || scope.includeInProgress === false)) return false;
    return true;
  });

  function weightedPct(tasks) {
    const totalWeight = tasks.reduce((sum, t) => sum + safeWeight(t), 0);
    if (totalWeight === 0) return 0;
    const done = tasks.reduce((sum, t) => sum + safeWeight(t) * safeProgress(t), 0);
    return done / totalWeight;
  }

  const overall = weightedPct(counted);
  const byPhase = {};
  PHASES.forEach(p => { byPhase[p] = weightedPct(counted.filter(t => Number(t.phase) === p)); });

  const totalWeight = counted.reduce((sum, t) => sum + safeWeight(t), 0);
  const waitingWeight = counted.filter(t => t.status === 'waiting_client').reduce((sum, t) => sum + safeWeight(t), 0);
  const waitingClientPct = totalWeight ? (waitingWeight / totalWeight) * 100 : 0;

  const blocked = counted.filter(t => t.status === 'blocked');

  const statusCounts = {};
  TASK_STATUS_ORDER.forEach(s => { statusCounts[s] = counted.filter(t => t.status === s).length; });

  // Milestone Readiness：completed ≠ progress=100（開發完成 ≠ 已完成驗收），status 才是判斷依據
  const milestoneReadiness = MILESTONES.map(m => {
    const required = counted.filter(t => Number(t.requiredByMilestone || t.phase) <= m);
    const completed = required.filter(t => t.status === 'completed');
    const inReview  = required.filter(t => t.status === 'review');
    const remaining = required.length - completed.length - inReview.length;
    return {
      milestone: m,
      required: required.length,
      completed: completed.length,
      inReview: inReview.length,
      remaining,
      ready: completed.length === required.length, // 全部 required task 都必須是 completed 狀態，review 不算
    };
  });

  return { overall, byPhase, waitingClientPct, blocked, statusCounts, milestoneReadiness, totalTasks: counted.length, totalScopes: projectScopes.length };
}

function scopeProgress(scopeId) {
  const tasks = projectTasks.filter(t => t.scopeId === scopeId && t.active !== false);
  const totalWeight = tasks.reduce((sum, t) => sum + safeWeight(t), 0);
  if (totalWeight === 0) return 0;
  const done = tasks.reduce((sum, t) => sum + safeWeight(t) * safeProgress(t), 0);
  return done / totalWeight;
}

function renderPhaseTaskGroup(phase, m) {
  const tasksInPhase = projectTasks.filter(t => Number(t.phase) === phase);
  if (!tasksInPhase.length) return '';

  const phaseKey = 'phase_' + phase;
  const phaseCollapsed = collapsedGroups.has(phaseKey);
  const phaseProgress = (m && m.byPhase[phase]) || 0;

  // 依現有 scopeId 關聯資料分組（不依 Task 顯示名稱猜測），並依 Scope 目前既有順序排列；
  // 找不到對應 Scope（理論上不會發生，因刪除 Scope 會一併刪除其 Task）者歸入「未分類」保底顯示。
  const seenScopeIds = new Set(tasksInPhase.map(t => t.scopeId));
  const orderedScopeIds = projectScopes.map(s => s.id).filter(id => seenScopeIds.has(id));
  const unknownScopeIds = [...seenScopeIds].filter(id => !orderedScopeIds.includes(id));

  const scopeGroupsHtml = [...orderedScopeIds, ...unknownScopeIds].map(scopeId => {
    const scope = projectScopes.find(s => s.id === scopeId);
    const groupTasks = tasksInPhase.filter(t => t.scopeId === scopeId).sort((a,b) => (a.order||0) - (b.order||0));
    const scopeGroupKey = 'scope_' + phase + '_' + scopeId;
    const scopeCollapsed = collapsedGroups.has(scopeGroupKey);
    const scopeName = scope ? scope.name : '未分類（原 Scope 已不存在）';
    // Scope Overall Progress：該 Scope 在整個 Project 中所有 active Task 的整體進度，
    // 同一 Scope 出現在不同 Phase 時顯示相同數值，避免互相矛盾（沿用既有 scopeProgress()）
    const scopeOverall = scope ? scopeProgress(scopeId) : 0;

    return `
      <div style="margin-left:16px;margin-bottom:6px;border-left:2px solid var(--ink-10);padding-left:12px">
        <div style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:5px 0" onclick="toggleGroupCollapse('${scopeGroupKey}')">
          <span style="font-size:10.5px;color:var(--ink-30);width:12px;flex-shrink:0">${scopeCollapsed ? '▶' : '▼'}</span>
          <span style="font-size:12.5px;font-weight:600;color:var(--ink)">${escapeHtml(scopeName)}</span>
          <span style="font-size:11px;color:var(--ink-60)">${groupTasks.length} Tasks｜${scopeOverall.toFixed(1)}%</span>
        </div>
        ${scopeCollapsed ? '' : groupTasks.map(renderTaskRow).join('')}
      </div>`;
  }).join('');

  return `
    <div style="margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:7px 0;border-bottom:1.5px solid var(--ink-10)" onclick="toggleGroupCollapse('${phaseKey}')">
        <span style="font-size:12px;color:var(--ink-30);width:14px;flex-shrink:0">${phaseCollapsed ? '▶' : '▼'}</span>
        <span class="tag-section-label" style="margin:0;padding:0;border:none">${PHASE_LABELS[phase]}</span>
        <span style="font-size:11.5px;color:var(--ink-60)">${tasksInPhase.length} Tasks｜${phaseProgress.toFixed(1)}%</span>
      </div>
      ${phaseCollapsed ? '' : scopeGroupsHtml}
    </div>`;
}

// ══════════════════════════════════════════════════
//  EXISTING PROJECT INITIALIZATION v1
//  「初始化既有專案進度／批次調整 Task 狀態」
//  只能操作「目前已存在」的 Task 的 Status／Progress（必要時 waitingFor／blockedReason）。
//  不建立 Scope、不展開 Task、不動 Weight/Order/Phase/Milestone、不影響報價。
//  所有操作先在 initPanel.draft（純前端 local state）修改，按「確認套用」才寫 Firestore，
//  且只送出「實際有變更」的 Task，欄位範圍與正式 Task Editor 一致（不引入第二套邏輯）。
// ══════════════════════════════════════════════════

function openInitPanel() {
  const draft = {};
  projectTasks.forEach(t => {
    if (t.active === false) return; // 預設不處理已停用 Task（十八）
    draft[t.id] = {
      status: t.status || 'not_started',
      progress: Number.isFinite(Number(t.progress)) ? Number(t.progress) : 0,
      waitingFor: t.waitingFor || '',
      blockedReason: t.blockedReason || '',
    };
  });
  initPanel = { open: true, step: 'edit', draft };
  renderProjectUI();
}

function closeInitPanel() {
  initPanel = { open: false, step: 'edit', draft: {} };
  renderProjectUI();
}

function initSetTaskField(taskId, field, value) {
  if (!initPanel.draft[taskId]) return;
  initPanel.draft[taskId][field] = value;
  renderProjectUI();
}

// 套用單一 Task 的批次動作到 Draft（不觸碰 Firestore）
function initApplyBulkToTask(taskId, action) {
  const d = initPanel.draft[taskId];
  if (!d) return;
  if (action === 'completed')       { d.status = 'completed';   d.progress = 100; }
  else if (action === 'not_started') { d.status = 'not_started'; d.progress = 0; }
  else if (action === 'in_progress') { d.status = 'in_progress'; /* progress 保留原值，不猜測 */ }
}

function initBulkPhase(phase, action) {
  projectTasks
    .filter(t => Number(t.phase) === phase && t.active !== false && initPanel.draft[t.id])
    .forEach(t => initApplyBulkToTask(t.id, action));
  renderProjectUI();
}

// Scope 批次操作：影響該 Scope「所有」目前既有 Task，不論分散在哪個 Phase
function initBulkScope(scopeId, action) {
  projectTasks
    .filter(t => t.scopeId === scopeId && t.active !== false && initPanel.draft[t.id])
    .forEach(t => initApplyBulkToTask(t.id, action));
  renderProjectUI();
}

// 只有「Draft 與目前 Firestore 實際值不同」才算變更，避免把沒動過的 Task 也送去 update
function initComputeChanges() {
  const changes = [];
  Object.keys(initPanel.draft).forEach(taskId => {
    const t = projectTasks.find(x => x.id === taskId);
    if (!t) return;
    const d = initPanel.draft[taskId];
    const origStatus = t.status || 'not_started';
    const origProgress = Number.isFinite(Number(t.progress)) ? Number(t.progress) : 0;
    const origWaiting = t.waitingFor || '';
    const origBlocked = t.blockedReason || '';

    const statusChanged   = d.status !== origStatus;
    const progressChanged = Number(d.progress) !== origProgress;
    const waitingChanged  = d.status === 'waiting_client' && d.waitingFor !== origWaiting;
    const blockedChanged  = d.status === 'blocked' && d.blockedReason !== origBlocked;

    if (statusChanged || progressChanged || waitingChanged || blockedChanged) {
      changes.push({ taskId, task: t, draft: d });
    }
  });
  return changes;
}

function initGoPreview() { initPanel.step = 'preview'; renderProjectUI(); }
function initBackToEdit() { initPanel.step = 'edit'; renderProjectUI(); }

async function initConfirmApply() {
  const changes = initComputeChanges();
  if (!changes.length) { closeInitPanel(); return; }
  if (!confirm(`確定要批次更新 ${changes.length} 個 Task 的 Status 與 Progress 嗎？\n此操作不會修改 Weight、Order、Phase、Milestone，也不會修改正式報價。`)) return;

  try {
    const quoteRef = db.collection('quotes').doc(currentId);
    const taskColl = quoteRef.collection('tasks');
    const batch = db.batch();

    changes.forEach(c => {
      const payload = {
        status: c.draft.status,
        progress: c.draft.progress,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      };
      // 僅在對應狀態時才更新 waitingFor / blockedReason，維持與正式 Task Editor 一致的欄位範圍
      if (c.draft.status === 'waiting_client') payload.waitingFor = c.draft.waitingFor || null;
      if (c.draft.status === 'blocked')        payload.blockedReason = c.draft.blockedReason || null;
      batch.update(taskColl.doc(c.taskId), payload);
    });

    // 使用安全的 nested field update，不覆蓋整個 project object；
    // 第一次成功記錄 initialProgressInitializedAt，之後都記錄 lastBulkTaskUpdateAt（可重複使用，非一次性鎖）
    const isFirstTime = !(currentData.project && currentData.project.initialProgressInitializedAt);
    const markerField = isFirstTime ? 'initialProgressInitializedAt' : 'lastBulkTaskUpdateAt';
    batch.update(quoteRef, {
      [`project.${markerField}`]: firebase.firestore.FieldValue.serverTimestamp(),
      'project.updatedAt': firebase.firestore.FieldValue.serverTimestamp(),
    });

    await batch.commit();

    // Firestore 成功後才同步正式 local projectTasks（避免假成功）
    changes.forEach(c => {
      const t = projectTasks.find(x => x.id === c.taskId);
      if (!t) return;
      t.status = c.draft.status;
      t.progress = c.draft.progress;
      if (c.draft.status === 'waiting_client') t.waitingFor = c.draft.waitingFor || null;
      if (c.draft.status === 'blocked')        t.blockedReason = c.draft.blockedReason || null;
    });
    currentData.project = currentData.project || {};
    currentData.project[markerField] = true;

    showToast(`✓ 已更新 ${changes.length} 個 Task`);
    initPanel = { open: false, step: 'edit', draft: {} };
    renderProjectUI(); // 沿用既有 Progress / Milestone Readiness 計算邏輯，不建立第二套公式
  } catch (err) {
    console.error(err);
    showToast(`⚠ 批次更新失敗：${err.message || err}`);
    // 失敗：不關閉 Panel、不清空 Draft，保留讓使用者重試，也不動正式 local projectTasks
  }
}

function renderInitPanel(m) {
  if (!initPanel.open) return '';
  if (initPanel.step === 'preview') return renderInitPreview();

  const draftTaskIds = new Set(Object.keys(initPanel.draft));
  const draftTasks = projectTasks.filter(t => draftTaskIds.has(t.id));

  const phaseBlocks = PHASES.map(phase => {
    const tasksInPhase = draftTasks.filter(t => Number(t.phase) === phase);
    if (!tasksInPhase.length) return '';

    const seenScopeIds = new Set(tasksInPhase.map(t => t.scopeId));
    const orderedScopeIds = projectScopes.map(s => s.id).filter(id => seenScopeIds.has(id));
    const unknownScopeIds = [...seenScopeIds].filter(id => !orderedScopeIds.includes(id));

    const scopeBlocks = [...orderedScopeIds, ...unknownScopeIds].map(scopeId => {
      const scope = projectScopes.find(s => s.id === scopeId);
      const groupTasks = tasksInPhase.filter(t => t.scopeId === scopeId).sort((a,b) => (a.order||0) - (b.order||0));
      const scopeName = scope ? scope.name : '未分類';
      return `
        <div style="margin-left:14px;margin-bottom:10px;border-left:2px solid var(--ink-10);padding-left:12px">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:6px">
            <div style="font-size:12.5px;font-weight:600;color:var(--ink)">${escapeHtml(scopeName)} <span style="font-size:11px;color:var(--ink-60);font-weight:400">${groupTasks.length} Tasks</span></div>
            <div style="display:flex;gap:5px;flex-wrap:wrap">
              <button class="btn-copy-link" onclick="initBulkScope('${scopeId}','completed')">全部已完成</button>
              <button class="btn-copy-link" onclick="initBulkScope('${scopeId}','in_progress')">全部進行中</button>
              <button class="btn-copy-link" onclick="initBulkScope('${scopeId}','not_started')">全部未開始</button>
            </div>
          </div>
          ${groupTasks.map(renderInitTaskRow).join('')}
        </div>`;
    }).join('');

    return `
      <div style="margin-bottom:14px">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;padding:6px 0;border-bottom:1.5px solid var(--ink-10);margin-bottom:6px">
          <span class="tag-section-label" style="margin:0;padding:0;border:none">${PHASE_LABELS[phase]} <span style="font-size:11px;color:var(--ink-60);font-weight:400">${tasksInPhase.length} Tasks</span></span>
          <div style="display:flex;gap:5px;flex-wrap:wrap">
            <button class="btn-copy-link" onclick="initBulkPhase(${phase},'completed')">全部已完成</button>
            <button class="btn-copy-link" onclick="initBulkPhase(${phase},'in_progress')">全部進行中</button>
            <button class="btn-copy-link" onclick="initBulkPhase(${phase},'not_started')">全部未開始</button>
          </div>
        </div>
        ${scopeBlocks}
      </div>`;
  }).join('');

  return `
    <div class="card" style="border:2px solid var(--ink)">
      <div class="card-title">初始化既有專案進度</div>
      <div style="font-size:12px;color:var(--ink-60);margin-bottom:12px;line-height:1.6">
        此工具只會修改目前「已存在」Task 的 Status 與 Progress。不會建立新 Task、不會展開 Scope，也不會修改 Weight、Order、Phase、Milestone 或報價。所有調整會先暫存在草稿中，按「預覽變更」後才會顯示即將寫入 Firestore 的內容。已停用（active=false）的 Task 不會出現在這裡。
      </div>
      ${draftTasks.length ? phaseBlocks : '<div class="tag-empty">目前沒有可調整的 Task（僅列出已存在且未停用的 Task）</div>'}
      <div style="display:flex;gap:8px;margin-top:14px">
        <button class="btn-copy-link" onclick="closeInitPanel()">取消</button>
        ${draftTasks.length ? `<button class="btn-save" style="padding:9px 18px" onclick="initGoPreview()">預覽變更</button>` : ''}
      </div>
    </div>`;
}

// ── 展開 Scope 成 Development Tasks（依 Task Template；已展開過則需確認是否再次生成）──
// ── Legacy Compatibility：舊版 Task 可能沒有 templateTaskKey（v1 尚未加入穩定 key 前生成的資料）。
//    優先用 templateTaskKey 比對；沒有的話，才用 Task Name 對照該 Scope 的樣板做「一次性」fallback。
//    對上了就回傳 key（呼叫端會把它寫回 Firestore，完成 migration）；對不上就回傳 null，
//    視為管理者自訂 / 已改名的 custom Task，不猜測、不覆蓋、不刪除。
// 本輪 Template 校正時被改名的項目：舊名稱 → 對應既有 stable templateTaskKey。
// 僅供尚未完成 templateTaskKey migration 的 legacy Task 使用，明確表列、非模糊字串比對。
const LEGACY_NAME_ALIASES = {
  '測試環境串接': 'payment_sandbox',
  '正式環境測試': 'payment_production_test',
  'Production 測試': 'launch_adv_06',
};

function resolveLegacyTemplateTaskKey(task, template) {
  if (task.templateTaskKey) return task.templateTaskKey;
  if (!template) return null;
  // 1) 用目前 Template 的 name 完全比對
  const match = template.find(t => t.name === task.name);
  if (match) return match.key;
  // 2) 本輪改名前的舊名稱 alias（明確表列，非模糊比對），避免因 rename 誤判成自訂 Task 而重複生成
  const aliasKey = LEGACY_NAME_ALIASES[task.name];
  if (aliasKey && template.some(t => t.key === aliasKey)) return aliasKey;
  return null;
}

async function expandScopeToTasks(scopeId) {
  const scope = projectScopes.find(s => s.id === scopeId);
  if (!scope) return;

  const tpl = TASK_TEMPLATES[scope.taskTemplateKey] || TASK_TEMPLATES.minor_addon;
  const existingTasks = projectTasks.filter(t => t.scopeId === scopeId);

  let mode = 'add'; // 尚未展開過：直接視為「新增全部」，等同於補齊缺少的（現有為 0 項）
  if (scope.tasksGenerated || existingTasks.length) {
    // 三種行為概念：取消／僅新增缺少的預設 Tasks（推薦）／強制重新生成完整一套
    const choice = prompt(
      '此 Scope 已存在 Development Tasks。\n' +
      '輸入 "add" ：僅新增缺少的預設 Tasks（推薦，不會重複建立）\n' +
      '輸入 "force"：強制重新生成完整一套樣板 Tasks（不會刪除既有 Task，但可能產生重複）\n' +
      '留空或取消：不執行任何動作',
      'add'
    );
    if (choice === null) return;
    const normalized = choice.trim().toLowerCase();
    if (normalized !== 'add' && normalized !== 'force') { showToast('已取消，未輸入有效指令'); return; }
    mode = normalized;
    if (mode === 'force') {
      if (!confirm('確定要強制重新生成完整一套 Tasks？既有 Task 不會被刪除，但這會建立一批新的重複樣板任務，請確認這是你要的操作。')) return;
    }
  }

  // 「僅新增缺少的」：比對 templateTaskKey；沒有 templateTaskKey 的舊 Task 用 Task Name 對照樣板做
  // 一次性 legacy migration（對上了會在下方 batch 中把 templateTaskKey 補寫回 Firestore）。
  // 管理者自行建立、或已改名對不上樣板的 Task，templateTaskKey 保持 null，視為 custom/manual Task，不受影響。
  const existingKeys = new Set();
  const legacyMigrations = []; // { taskId, key }
  existingTasks.forEach(t => {
    const resolved = resolveLegacyTemplateTaskKey(t, tpl);
    if (!resolved) return;
    existingKeys.add(resolved);
    if (!t.templateTaskKey) legacyMigrations.push({ taskId: t.id, key: resolved });
  });

  const tasksToCreate = (mode === 'add') ? tpl.filter(t => !existingKeys.has(t.key)) : tpl;

  if (mode === 'add' && tasksToCreate.length === 0 && legacyMigrations.length === 0) {
    showToast('此 Scope 的預設 Tasks 皆已存在，未新增任何項目');
    return;
  }

  const existingMaxOrder = existingTasks.reduce((mx, t) => Math.max(mx, t.order || 0), 0);

  try {
    const taskColl = db.collection('quotes').doc(currentId).collection('tasks');
    const batch = db.batch();
    const newTasks = [];

    tasksToCreate.forEach((t, idx) => {
      const ref = taskColl.doc();
      const data = {
        scopeId,
        templateTaskKey: t.key || null,
        name: t.name,
        description: '',
        category: t.category || '',
        weight: t.weight,
        phase: t.phase,
        order: existingMaxOrder + (idx + 1) * 10,
        requiredByMilestone: t.milestone || t.phase,
        status: 'not_started',
        progress: 0,
        active: true,
        source: scope.source || 'initial_scope',
        crId: scope.crId || null,
        waitingFor: null,
        blockedReason: null,
        notes: '',
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      };
      batch.set(ref, data);
      newTasks.push({ id: ref.id, ...data });
    });

    // 補寫舊 Task 的 templateTaskKey，完成 migration，之後就能完全依穩定 key 判斷
    legacyMigrations.forEach(mig => {
      batch.update(taskColl.doc(mig.taskId), {
        templateTaskKey: mig.key,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    });

    batch.update(db.collection('quotes').doc(currentId).collection('scopes').doc(scopeId), {
      tasksGenerated: true,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });

    await batch.commit();
    scope.tasksGenerated = true;
    projectTasks.push(...newTasks);
    legacyMigrations.forEach(mig => {
      const t = projectTasks.find(pt => pt.id === mig.taskId);
      if (t) t.templateTaskKey = mig.key;
    });
    const migrationNote = legacyMigrations.length ? `，並補齊 ${legacyMigrations.length} 項舊 Task 的 templateTaskKey` : '';
    showToast(`✓ 已產生 ${newTasks.length} 項開發任務${migrationNote}`);
    renderProjectUI();
  } catch (err) {
    console.error(err);
    showToast(`⚠ 展開任務失敗：${err.message || err}`);
  }
}

// ── Scope CRUD ──
async function addManualScope() {
  const nameEl = document.getElementById('new-scope-name');
  const sourceEl = document.getElementById('new-scope-source');
  const name = (nameEl.value || '').trim();
  if (!name) { showToast('請輸入 Scope 名稱'); return; }

  try {
    const maxOrder = projectScopes.reduce((mx, s) => Math.max(mx, s.order || 0), 0);
    const ref = db.collection('quotes').doc(currentId).collection('scopes').doc();
    const data = {
      name, description: '', source: sourceEl.value, crId: null, sourceQuoteItem: null,
      active: true, includeInProgress: true, order: maxOrder + 10,
      taskTemplateKey: 'minor_addon', tasksGenerated: false,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    };
    await ref.set(data);
    projectScopes.push({ id: ref.id, ...data });
    nameEl.value = '';
    showToast('✓ 已新增 Scope');
    renderProjectUI();
  } catch (err) {
    console.error(err);
    showToast(`⚠ 新增 Scope 失敗：${err.message || err}`);
  }
}

async function deleteScope(scopeId) {
  const scope = projectScopes.find(s => s.id === scopeId);
  if (!scope) return;
  const relatedTasks = projectTasks.filter(t => t.scopeId === scopeId);
  const msg = relatedTasks.length
    ? `確定要刪除 Scope「${scope.name}」嗎？此 Scope 下的 ${relatedTasks.length} 項 Task 也會一併刪除，此操作無法復原。`
    : `確定要刪除 Scope「${scope.name}」嗎？此操作無法復原。`;
  if (!confirm(msg)) return;

  try {
    const batch = db.batch();
    batch.delete(db.collection('quotes').doc(currentId).collection('scopes').doc(scopeId));
    relatedTasks.forEach(t => batch.delete(db.collection('quotes').doc(currentId).collection('tasks').doc(t.id)));
    await batch.commit();
    projectScopes = projectScopes.filter(s => s.id !== scopeId);
    projectTasks = projectTasks.filter(t => t.scopeId !== scopeId);
    showToast('✓ 已刪除 Scope');
    renderProjectUI();
  } catch (err) {
    console.error(err);
    showToast(`⚠ 刪除失敗：${err.message || err}`);
  }
}

// ── Task 欄位驗證：擋下無效值，顯示明確錯誤，並重新渲染把 UI 還原成儲存值 ──
function validateTaskField(field, value) {
  if (field === 'weight') {
    if (!Number.isFinite(value) || value <= 0) return 'Weight 必須為大於 0 的數字';
  }
  if (field === 'progress') {
    if (!Number.isFinite(value) || value < 0 || value > 100) return 'Progress 必須為 0～100 之間的數字';
  }
  if (field === 'order') {
    if (!Number.isFinite(value) || value < 0 || !Number.isInteger(value)) return 'Order 必須為 0 以上的整數';
  }
  if (field === 'phase') {
    if (!PHASES.includes(Number(value))) return 'Phase 必須為合法的 Phase（1～3）';
  }
  if (field === 'requiredByMilestone') {
    if (!MILESTONES.includes(Number(value))) return 'Required By Milestone 必須為合法的 Milestone（1～3）';
  }
  return null;
}

async function updateTaskField(taskId, field, value) {
  const task = projectTasks.find(t => t.id === taskId);
  if (!task) return;

  const err = validateTaskField(field, value);
  if (err) {
    showToast(`⚠ ${err}`);
    renderProjectUI(); // 還原 UI 顯示為目前已儲存的值，避免畫面停在無效輸入
    return;
  }

  try {
    await db.collection('quotes').doc(currentId).collection('tasks').doc(taskId).update({
      [field]: value,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    task[field] = value;
    renderProjectUI();
  } catch (err2) {
    console.error(err2);
    showToast(`⚠ 更新失敗：${err2.message || err2}`);
  }
}

async function quickComplete(taskId) {

async function updateProjectStatus(newStatus) {
  try {
    await db.collection('quotes').doc(currentId).update({
      'project.status': newStatus,
      'project.updatedAt': firebase.firestore.FieldValue.serverTimestamp(),
    });
    currentData.project = currentData.project || {};

  } catch (err) {

    showToast(`⚠ 更新失敗：${err.message || err}`);
  }
}

// ══════════════════════════════════════════════════
//  ACTIVITY TIMELINE
// ══════════════════════════════════════════════════
function genActivityId() {
  return 'act_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
}

function fmtTimelineTime(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit' }) +
         ' ' + d.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
}

function renderTimelineList(logs) {
  if (!logs || logs.length === 0) {
    return '<div class="timeline-empty">尚無紀錄，新增第一筆吧。</div>';
  }

  // 由新到舊排序（依 createdAt，Firestore Timestamp 物件需轉成 millis 比較）
  const sorted = [...logs].sort((a, b) => {
    const ta = a.createdAt && a.createdAt.toMillis ? a.createdAt.toMillis() : (a.createdAt ? new Date(a.createdAt).getTime() : 0);
    const tb = b.createdAt && b.createdAt.toMillis ? b.createdAt.toMillis() : (b.createdAt ? new Date(b.createdAt).getTime() : 0);
    return tb - ta;
  });

  return sorted.map((log, idx) => `
    <div class="timeline-entry">
      <div class="timeline-dot-col">
        <div class="timeline-dot type-${log.type}"></div>
        ${idx < sorted.length - 1 ? '<div class="timeline-line"></div>' : ''}
      </div>
      <div class="timeline-body">
        <div class="timeline-meta">
          <span class="timeline-type-tag type-${log.type}">${ACTIVITY_TYPE_LABELS[log.type] || log.type}</span>
          <span class="timeline-time">${fmtTimelineTime(log.createdAt)}</span>
          <span class="timeline-by">by ${escapeHtml(log.createdBy || 'me')}</span>
        </div>
        <div class="timeline-content">${escapeHtml(log.content || '')}</div>
      </div>
      <button class="timeline-delete-btn" onclick="deleteActivityLog('${log.id}')" title="刪除這筆紀錄">✕</button>
    </div>`).join('');
}

// ── 新增紀錄：讀取現有 activityLogs 後合併，不覆蓋原資料 ──
async function addActivityLog() {
  if (!currentId) return;

  const typeEl    = document.getElementById('timelineType');
  const contentEl = document.getElementById('timelineContent');
  const btn       = document.getElementById('timelineAddBtn');

  const content = contentEl.value.trim();
  if (!content) { showToast('請輸入紀錄內容'); return; }

  btn.disabled = true;
  btn.textContent = '新增中…';

  const newEntry = {
    id:        genActivityId(),
    type:      typeEl.value,
    content:   content,
    createdAt: firebase.firestore.Timestamp.now(),  // client timestamp（陣列內無法用 serverTimestamp）
    createdBy: 'me',
  };

  try {
    // 用 arrayUnion 合併寫入，不影響文件其他欄位
    await db.collection('quotes').doc(currentId).update({
      activityLogs: firebase.firestore.FieldValue.arrayUnion(newEntry),
    });

    // 同步更新本地快取與畫面
    if (!currentData.activityLogs) currentData.activityLogs = [];
    currentData.activityLogs.push(newEntry);
    document.getElementById('timelineList').innerHTML = renderTimelineList(currentData.activityLogs);

    contentEl.value = '';
    showToast('✓ 已新增紀錄');
  } catch (err) {
    console.error(err);
    showToast(`⚠ 新增失敗：${err.message || err}`);
  } finally {
    btn.disabled = false;
    btn.textContent = '新增紀錄';
  }
}

// ── 刪除紀錄：用 arrayRemove 需要完整物件比對，改用「讀取全部 → 過濾 → 整批寫回」較穩定 ──
async function deleteActivityLog(logId) {
  if (!currentId) return;
  if (!confirm('確定要刪除這筆紀錄嗎？')) return;

  const updatedLogs = (currentData.activityLogs || []).filter(log => log.id !== logId);

  try {
    await db.collection('quotes').doc(currentId).update({
      activityLogs: updatedLogs,
    });

    currentData.activityLogs = updatedLogs;
    document.getElementById('timelineList').innerHTML = renderTimelineList(currentData.activityLogs);
    showToast('✓ 已刪除紀錄');
  } catch (err) {
    console.error(err);
    showToast(`⚠ 刪除失敗：${err.message || err}`);
  }
}

function onProgressInput(val) {
  document.getElementById('progressValue').textContent = `${val}%`;
  document.getElementById('progressFill').style.width = `${val}%`;
  markDirty();
}

function markDirty() {
  dirty = true;
  const s = document.getElementById('saveStatus');
  if (s) { s.textContent = '尚未儲存'; s.className = 'save-status'; }
}

// ══════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════
function tsToLocalInput(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

// ══════════════════════════════════════════════════
//  SAVE
// ══════════════════════════════════════════════════
async function saveChanges() {
  if (!currentId) return;
  const btn = document.getElementById('saveBtn');
  const statusEl = document.getElementById('saveStatus');

  btn.disabled = true;
  statusEl.textContent = '儲存中…';
  statusEl.className = 'save-status saving';

  const officialPriceRaw = document.getElementById('f-officialPrice').value;
  const lastContactRaw   = document.getElementById('f-lastContactAt').value;

  const payload = {
    officialPrice: officialPriceRaw === '' ? null : Number(officialPriceRaw),
    progress:      Number(document.getElementById('f-progress').value),
    paymentStatus: document.getElementById('f-paymentStatus').value,
    notes:         document.getElementById('f-notes').value,
    status:        document.getElementById('f-status').value,
    priority:      document.getElementById('f-priority').value,
    source:        document.getElementById('f-source').value,
    assignedTo:    document.getElementById('f-assignedTo').value,
    lastContactAt: lastContactRaw ? firebase.firestore.Timestamp.fromDate(new Date(lastContactRaw)) : null,
    updatedAt:     firebase.firestore.FieldValue.serverTimestamp(),
  };

  try {
    await db.collection('quotes').doc(currentId).update(payload);
    dirty = false;
    statusEl.textContent = '✓ 已儲存';
    statusEl.className = 'save-status saved';
    setTimeout(() => { if (!dirty) statusEl.textContent = ''; }, 2500);
  } catch (err) {
    console.error(err);
    statusEl.textContent = '⚠ 儲存失敗';
    statusEl.className = 'save-status error';
    showToast(`⚠ 儲存失敗：${err.message || err}`);
  } finally {
    btn.disabled = false;
  }
}

// 離開頁面前若有未儲存變更，提醒一下
window.addEventListener('beforeunload', (e) => {
  if (dirty) { e.preventDefault(); e.returnValue = ''; }
});

//  COPY QUOTATION LINK
// ══════════════════════════════════════════════════
function copyQuotationLink() {
  const token = currentData && currentData.clientToken;
  if (!token) {
    showToast('⚠ 此案件尚未產生客戶連結，請先在「正式報價」頁面儲存一次報價');
    return;
  }
  const base = window.location.href.replace(/\/[^/]*(\?.*)?$/, '/');
  const url  = `${base}quotation.html?id=${encodeURIComponent(currentId)}&token=${encodeURIComponent(token)}`;
  navigator.clipboard.writeText(url).then(() => {
    showToast('✓ 客戶連結已複製到剪貼簿');
  }).catch(() => {
    prompt('請手動複製此連結：', url);
  });
}

// ══════════════════════════════════════════════════
//  AUTH GUARD
// ══════════════════════════════════════════════════
function guardAdmin(onPass) {
  auth.onAuthStateChanged(user => {
    if (!user) {
      window.location.replace(`admin-login.html?next=${encodeURIComponent(window.location.href)}`);
      return;
    }
    if (!ALLOWED_EMAILS.includes(user.email)) {
      auth.signOut();
      window.location.replace('admin-login.html');
      return;
    }
    const emailEl = document.getElementById('headerEmail');
    if (emailEl) emailEl.textContent = user.email;
    onPass();
  });
}
async function signOut() {
  await auth.signOut();
  window.location.replace('admin-login.html');
}

guardAdmin(loadDetail);
