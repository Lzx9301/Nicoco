<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>案件詳情</title>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
/* ── Tokens（沿用同一套設計語言）─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:      #0f1117;
  --ink-60:   #60636e;
  --ink-30:   #b8bac4;
  --ink-10:   #f0f1f4;
  --white:    #ffffff;
  --accent:   #2563eb;
  --accent-light: #eff6ff;
  --green:    #16a34a;
  --green-light: #f0fdf4;
  --amber:    #d97706;
  --amber-light: #fffbeb;
  --red:      #dc2626;
  --purple:   #7c3aed;
  --purple-light: #f5f3ff;

  --r-sm: 6px;
  --r:    10px;
  --r-lg: 16px;
  --r-xl: 20px;

  --shadow-sm: 0 1px 4px rgba(15,17,23,.06);
  --shadow:    0 4px 16px rgba(15,17,23,.08);
  --shadow-lg: 0 12px 40px rgba(15,17,23,.10);

  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', 'PingFang TC', sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;

  --ease: cubic-bezier(.25,.46,.45,.94);
  --t: 160ms;
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
  color: var(--ink);
  background: var(--ink-10);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── Header ─────────────────────────────────────────────────── */
.header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 56px;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--ink-10);
}
.header-left { display: flex; align-items: center; gap: 14px; }
.back-link {
  font-size: 13px; color: var(--ink-60); text-decoration: none;
  display: flex; align-items: center; gap: 4px;
  transition: color var(--t);
}
.back-link:hover { color: var(--ink); }
.header-logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 600; color: var(--ink);
}
.header-logo-mark {
  width: 28px; height: 28px; background: var(--ink);
  border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 700;
}
.header-note { font-size: 12px; color: var(--ink-30); font-family: var(--mono); }

/* ── Layout ─────────────────────────────────────────────────── */
.wrap { max-width: 840px; margin: 0 auto; padding: 32px 24px 100px; }

/* ── Card ───────────────────────────────────────────────────── */
.card {
  background: var(--white); border: 1.5px solid var(--ink-10); border-radius: var(--r-xl);
  padding: 24px; margin-bottom: 16px;
}
.card-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: var(--ink-30); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--ink-10);
  display: flex; align-items: center; justify-content: space-between;
}

/* ── Quote header card ──────────────────────────────────────── */
.quote-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
.qh-id { font-family: var(--mono); font-size: 12px; color: var(--ink-30); margin-bottom: 4px; }
.qh-name { font-size: 22px; font-weight: 800; color: var(--ink); letter-spacing: -.5px; }
.qh-meta { font-size: 13px; color: var(--ink-60); margin-top: 4px; }
.status-badge {
  display: inline-block; font-size: 12px; font-weight: 600;
  padding: 5px 14px; border-radius: 20px; white-space: nowrap;
}
.status-new        { background: var(--accent-light); color: var(--accent); }
.status-contacted   { background: var(--purple-light); color: var(--purple); }
.status-meeting     { background: var(--amber-light); color: var(--amber); }
.status-quoted      { background: #ecfeff; color: #0891b2; }
.status-developing  { background: #fff7ed; color: #ea580c; }
.status-done         { background: var(--green-light); color: var(--green); }
.status-cancelled    { background: var(--ink-10); color: var(--ink-30); }

/* ── Info grid ──────────────────────────────────────────────── */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.info-box { padding: 10px 12px; background: var(--ink-10); border-radius: var(--r-sm); }
.info-label { font-size: 10px; color: var(--ink-30); margin-bottom: 2px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
.info-value { font-size: 13px; font-weight: 500; color: var(--ink); }
.info-value.mono { font-family: var(--mono); font-size: 12px; }

/* ── Tags ───────────────────────────────────────────────────── */
.tag-section { margin-bottom: 14px; }
.tag-section:last-child { margin-bottom: 0; }
.tag-section-label { font-size: 11px; font-weight: 600; color: var(--ink-60); margin-bottom: 6px; }
.tags { display: flex; flex-wrap: wrap; gap: 5px; }
.dtag { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: var(--ink-10); color: var(--ink-60); font-weight: 500; }
.dtag.included { background: var(--green-light); color: var(--green); }
.dtag.eval     { background: var(--amber-light); color: var(--amber); }
.tag-empty { font-size: 12px; color: var(--ink-30); }

/* ── Editable fields ────────────────────────────────────────── */
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.field-row:last-child { margin-bottom: 0; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field.full { grid-column: 1/-1; }
.field-label { font-size: 12px; font-weight: 500; color: var(--ink-60); }
.field-input, .field-select, .field-textarea {
  padding: 9px 12px;
  border: 1.5px solid var(--ink-10); border-radius: var(--r-sm);
  font-size: 13px; color: var(--ink); font-family: var(--font);
  background: var(--white); outline: none;
  transition: border-color var(--t);
}
.field-input:focus, .field-select:focus, .field-textarea:focus { border-color: var(--ink); }
.field-textarea { resize: vertical; min-height: 80px; }

/* progress slider */
.progress-row { display: flex; align-items: center; gap: 12px; }
.progress-slider { flex: 1; accent-color: var(--ink); cursor: pointer; }
.progress-value { font-size: 14px; font-weight: 700; color: var(--ink); width: 44px; text-align: right; font-variant-numeric: tabular-nums; }
.progress-track { height: 6px; background: var(--ink-10); border-radius: 4px; overflow: hidden; margin-top: 8px; }
.progress-fill { height: 100%; background: var(--ink); border-radius: 4px; transition: width .25s var(--ease); }

/* ── Save bar ───────────────────────────────────────────────── */
.save-bar {
  position: sticky; bottom: 20px;
  display: flex; justify-content: flex-end; align-items: center; gap: 12px;
  margin-top: 8px;
}
.save-status { font-size: 12px; color: var(--ink-30); }
.save-status.saving  { color: var(--accent); }
.save-status.saved   { color: var(--green); }
.save-status.error   { color: var(--red); }
.btn-save {
  padding: 11px 26px; border-radius: var(--r-sm); border: none;
  background: var(--ink); color: #fff; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background var(--t); box-shadow: var(--shadow);
}
.btn-save:hover { background: #2a2d38; }
.btn-save:disabled { background: var(--ink-30); cursor: not-allowed; }

/* ── Loading / Error ────────────────────────────────────────── */
.loading-state, .error-state {
  text-align: center; padding: 100px 0; color: var(--ink-30); font-size: 14px;
}
.loading-state .spinner {
  width: 24px; height: 24px; border: 2.5px solid var(--ink-10); border-top-color: var(--ink);
  border-radius: 50%; margin: 0 auto 14px; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ──────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px);
  background: var(--ink); color: #fff; font-size: 13px;
  padding: 11px 20px; border-radius: var(--r); white-space: nowrap;
  opacity: 0; pointer-events: none; transition: all .25s var(--ease); z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Activity Timeline ──────────────────────────────────────── */
.timeline-form {
  display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;
}
.timeline-type-select {
  width: 140px; flex-shrink: 0;
  padding: 9px 12px; border: 1.5px solid var(--ink-10); border-radius: var(--r-sm);
  font-size: 13px; color: var(--ink); font-family: var(--font);
  background: var(--white); outline: none; cursor: pointer;
}
.timeline-type-select:focus { border-color: var(--ink); }
.timeline-content-input {
  flex: 1; min-width: 200px;
  padding: 9px 12px; border: 1.5px solid var(--ink-10); border-radius: var(--r-sm);
  font-size: 13px; color: var(--ink); font-family: var(--font);
  background: var(--white); outline: none; resize: vertical; min-height: 38px;
}
.timeline-content-input:focus { border-color: var(--ink); }
.timeline-add-btn {
  flex-shrink: 0; padding: 9px 20px; border-radius: var(--r-sm); border: none;
  background: var(--ink); color: #fff; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background var(--t);
}
.timeline-add-btn:hover { background: #2a2d38; }
.timeline-add-btn:disabled { background: var(--ink-30); cursor: not-allowed; }

.timeline-list { display: flex; flex-direction: column; gap: 0; }
.timeline-entry {
  display: flex; gap: 12px; padding: 14px 0;
  border-bottom: 1px solid var(--ink-10);
}
.timeline-entry:last-child { border-bottom: none; padding-bottom: 0; }
.timeline-dot-col {
  display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 8px;
}
.timeline-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--ink-30); margin-top: 6px; flex-shrink: 0;
}
.timeline-dot.type-contact      { background: var(--accent); }
.timeline-dot.type-meeting      { background: var(--amber); }
.timeline-dot.type-quote        { background: #0891b2; }
.timeline-dot.type-payment      { background: var(--green); }
.timeline-dot.type-development  { background: #ea580c; }
.timeline-dot.type-note         { background: var(--ink-30); }
.timeline-line { flex: 1; width: 1px; background: var(--ink-10); margin-top: 4px; }

.timeline-body { flex: 1; min-width: 0; }
.timeline-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; flex-wrap: wrap; }
.timeline-type-tag {
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
  text-transform: uppercase; letter-spacing: .04em;
}
.timeline-type-tag.type-contact      { background: var(--accent-light); color: var(--accent); }
.timeline-type-tag.type-meeting      { background: var(--amber-light); color: var(--amber); }
.timeline-type-tag.type-quote        { background: #ecfeff; color: #0891b2; }
.timeline-type-tag.type-payment      { background: var(--green-light); color: var(--green); }
.timeline-type-tag.type-development  { background: #fff7ed; color: #ea580c; }
.timeline-type-tag.type-note         { background: var(--ink-10); color: var(--ink-60); }
.timeline-time { font-size: 11px; color: var(--ink-30); }
.timeline-by   { font-size: 11px; color: var(--ink-30); }
.timeline-content { font-size: 13px; color: var(--ink); line-height: 1.6; white-space: pre-wrap; }
.timeline-delete-btn {
  flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
  border: none; background: transparent; color: var(--ink-30);
  font-size: 13px; cursor: pointer; transition: all var(--t);
  display: flex; align-items: center; justify-content: center;
}
.timeline-delete-btn:hover { background: #fef2f2; color: var(--red); }
.timeline-empty { font-size: 13px; color: var(--ink-30); padding: 8px 0; }

/* ── RWD ────────────────────────────────────────────────────── */
@media (max-width: 700px) {
  .info-grid, .field-row { grid-template-columns: 1fr; }
  .quote-header { flex-direction: column; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <a class="back-link" href="quote-admin.html">← 返回列表</a>
  </div>
  <div class="header-logo">
    <div class="header-logo-mark">W</div>
    案件詳情
  </div>
  <div class="header-note" id="headerQuoteId"></div>
</header>

<div class="wrap" id="wrap">
  <div class="loading-state"><div class="spinner"></div>載入案件中…</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════
const STATUS_LABELS = {
  new: '新案件', contacted: '已聯絡', meeting: '需求訪談',
  quoted: '已報價', developing: '開發中', done: '完成', cancelled: '取消',
};
const STATUS_ORDER = ['new','contacted','meeting','quoted','developing','done','cancelled'];

const PAYMENT_LABELS = { unpaid: '未付款', deposit: '已收訂金', paid: '已全額付清' };
const PAYMENT_ORDER  = ['unpaid','deposit','paid'];

const PRIORITY_LABELS = { low: '低', normal: '一般', high: '高' };
const PRIORITY_ORDER  = ['low','normal','high'];

const SOURCE_OPTIONS = ['website','referral','facebook','instagram','google','other'];
const SOURCE_LABELS  = { website:'官網表單', referral:'介紹', facebook:'Facebook', instagram:'Instagram', google:'Google 搜尋', other:'其他' };

const ACTIVITY_TYPE_LABELS = {
  contact:     '聯絡紀錄',
  meeting:     '需求訪談',
  quote:       '報價紀錄',
  payment:     '付款紀錄',
  development: '開發進度',
  note:        '一般備註',
};
const ACTIVITY_TYPE_ORDER = ['contact','meeting','quote','payment','development','note'];

let currentId = null;
let currentData = null;
let dirty = false;

// ══════════════════════════════════════════════════
//  GET ?id= FROM URL
// ══════════════════════════════════════════════════
function getIdFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

// ══════════════════════════════════════════════════
//  LOAD
// ══════════════════════════════════════════════════
async function loadDetail() {
  currentId = getIdFromUrl();
  const wrap = document.getElementById('wrap');

  if (!currentId) {
    wrap.innerHTML = '<div class="error-state">⚠ 網址缺少案件 id 參數（例如 ?id=Q-20260701-123）</div>';
    return;
  }

  try {
    const docSnap = await db.collection('quotes').doc(currentId).get();
    if (!docSnap.exists) {
      wrap.innerHTML = `<div class="error-state">⚠ 找不到案件：${escapeHtml(currentId)}</div>`;
      return;
    }
    currentData = docSnap.data();
    document.getElementById('headerQuoteId').textContent = currentData.quoteId || currentId;
    renderDetail();
  } catch (err) {
    console.error(err);
    wrap.innerHTML = `<div class="error-state">⚠ 讀取失敗：${escapeHtml(err.message || String(err))}</div>`;
  }
}

// ══════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════
function fmtDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit' }) +
         ' ' + d.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
}

function fmtPriceRange(q) {
  if (q.priceMid === null || q.priceMid === undefined) return '需評估';
  return `NT$${Number(q.priceMid).toLocaleString()}（${q.priceRange || '—'}）`;
}

function renderDetail() {
  const q = currentData;
  const wrap = document.getElementById('wrap');

  const includedTags = (q.includedItems || []).map(n => `<span class="dtag included">✓ ${escapeHtml(n)}</span>`).join('');
  const selectedTags = (q.selectedItems || []).map(n => `<span class="dtag">${escapeHtml(n)}</span>`).join('');
  const evalTags      = (q.evaluationItems || []).map(n => `<span class="dtag eval">◆ ${escapeHtml(n)}</span>`).join('');

  const statusClass = `status-${q.status || 'new'}`;
  const statusLabel = STATUS_LABELS[q.status] || q.status || '新案件';

  wrap.innerHTML = `
    <!-- 基本資訊（唯讀，來自估價系統） -->
    <div class="card">
      <div class="quote-header">
        <div>
          <div class="qh-id">${escapeHtml(q.quoteId || currentId)}</div>
          <div class="qh-name">${escapeHtml(q.name || '—')}　${q.company ? `<span style="font-size:14px;color:var(--ink-60);font-weight:500">／ ${escapeHtml(q.company)}</span>` : ''}</div>
          <div class="qh-meta">${escapeHtml(q.projectType || '—')} ・ 建立於 ${fmtDate(q.createdAt)}</div>
        </div>
        <span class="status-badge ${statusClass}">${statusLabel}</span>
      </div>

      <div class="info-grid">
        <div class="info-box"><div class="info-label">Email</div><div class="info-value">${escapeHtml(q.email || '—')}</div></div>
        <div class="info-box"><div class="info-label">電話</div><div class="info-value">${escapeHtml(q.phone || '—')}</div></div>
        <div class="info-box"><div class="info-label">LINE</div><div class="info-value">${escapeHtml(q.lineId || '—')}</div></div>
        <div class="info-box"><div class="info-label">預算</div><div class="info-value">${escapeHtml(q.budget || '—')}</div></div>
        <div class="info-box"><div class="info-label">預計上線</div><div class="info-value">${escapeHtml(q.launchDate || '—')}</div></div>
        <div class="info-box"><div class="info-label">預估工期</div><div class="info-value">${escapeHtml(q.duration || '—')}</div></div>
        <div class="info-box" style="grid-column:1/-1"><div class="info-label">系統預估價格</div><div class="info-value">${fmtPriceRange(q)}</div></div>
      </div>
    </div>

    <!-- 功能明細（唯讀） -->
    <div class="card">
      <div class="card-title">功能明細</div>
      <div class="tag-section">
        <div class="tag-section-label">方案已包含</div>
        ${includedTags ? `<div class="tags">${includedTags}</div>` : '<div class="tag-empty">無</div>'}
      </div>
      <div class="tag-section">
        <div class="tag-section-label">加選功能</div>
        ${selectedTags ? `<div class="tags">${selectedTags}</div>` : '<div class="tag-empty">無</div>'}
      </div>
      <div class="tag-section">
        <div class="tag-section-label">需評估功能</div>
        ${evalTags ? `<div class="tags">${evalTags}</div>` : '<div class="tag-empty">無</div>'}
      </div>
      <div class="tag-section">
        <div class="tag-section-label">客戶補充說明</div>
        <div style="font-size:13px;color:var(--ink-60);line-height:1.6">${escapeHtml(q.message || '無')}</div>
      </div>
    </div>

    <!-- ── Phase 4.5：案件紀錄 Timeline ── -->
    <div class="card">
      <div class="card-title">案件紀錄 Timeline</div>

      <div class="timeline-form">
        <select class="timeline-type-select" id="timelineType">
          ${ACTIVITY_TYPE_ORDER.map(t => `<option value="${t}">${ACTIVITY_TYPE_LABELS[t]}</option>`).join('')}
        </select>
        <textarea class="timeline-content-input" id="timelineContent" rows="1" placeholder="輸入這次的紀錄內容…"></textarea>
        <button class="timeline-add-btn" id="timelineAddBtn" onclick="addActivityLog()">新增紀錄</button>
      </div>

      <div class="timeline-list" id="timelineList">
        ${renderTimelineList(q.activityLogs || [])}
      </div>
    </div>

    <!-- ── Phase 4：可編輯的營運欄位 ── -->
    <div class="card">
      <div class="card-title">案件管理</div>

      <div class="field-row">
        <div class="field">
          <label class="field-label">正式報價（officialPrice）</label>
          <input class="field-input" id="f-officialPrice" type="number" placeholder="輸入正式議定金額"
                 value="${q.officialPrice ?? ''}">
        </div>
        <div class="field">
          <label class="field-label">付款狀態（paymentStatus）</label>
          <select class="field-select" id="f-paymentStatus">
            ${PAYMENT_ORDER.map(p => `<option value="${p}" ${(q.paymentStatus||'unpaid')===p?'selected':''}>${PAYMENT_LABELS[p]}</option>`).join('')}
          </select>
        </div>
      </div>

      <div class="field-row">
        <div class="field full">
          <label class="field-label">專案進度（progress）</label>
          <div class="progress-row">
            <input class="progress-slider" id="f-progress" type="range" min="0" max="100" step="5"
                   value="${q.progress ?? 0}" oninput="onProgressInput(this.value)">
            <div class="progress-value" id="progressValue">${q.progress ?? 0}%</div>
          </div>
          <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:${q.progress ?? 0}%"></div></div>
        </div>
      </div>

      <div class="field-row">
        <div class="field full">
          <label class="field-label">內部備註（notes）</label>
          <textarea class="field-textarea" id="f-notes" placeholder="記錄聯絡內容、報價調整原因、客戶特殊要求等…">${escapeHtml(q.notes || '')}</textarea>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label class="field-label">案件狀態（status）</label>
          <select class="field-select" id="f-status">
            ${STATUS_ORDER.map(s => `<option value="${s}" ${q.status===s?'selected':''}>${STATUS_LABELS[s]}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label class="field-label">優先度（priority）</label>
          <select class="field-select" id="f-priority">
            ${PRIORITY_ORDER.map(p => `<option value="${p}" ${(q.priority||'normal')===p?'selected':''}>${PRIORITY_LABELS[p]}</option>`).join('')}
          </select>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label class="field-label">案件來源（source）</label>
          <select class="field-select" id="f-source">
            <option value="">未設定</option>
            ${SOURCE_OPTIONS.map(s => `<option value="${s}" ${(q.source||'')===s?'selected':''}>${SOURCE_LABELS[s]}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label class="field-label">負責人（assignedTo）</label>
          <input class="field-input" id="f-assignedTo" type="text" placeholder="例如：me" value="${escapeHtml(q.assignedTo || '')}">
        </div>
      </div>

      <div class="field-row">
        <div class="field full">
          <label class="field-label">最後聯絡時間（lastContactAt）</label>
          <input class="field-input" id="f-lastContactAt" type="datetime-local"
                 value="${tsToLocalInput(q.lastContactAt)}">
        </div>
      </div>

      <div style="font-size:11px;color:var(--ink-30);margin-top:4px">
        最後更新：${fmtDate(q.updatedAt)}
      </div>
    </div>

    <div class="save-bar">
      <span class="save-status" id="saveStatus"></span>
      <button class="btn-save" id="saveBtn" onclick="saveChanges()">儲存變更</button>
    </div>`;

  // 監聽欄位變動，標記 dirty
  ['f-officialPrice','f-paymentStatus','f-notes','f-status','f-priority','f-source','f-assignedTo','f-lastContactAt']
    .forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', () => markDirty());
    });
}

// ══════════════════════════════════════════════════
//  ACTIVITY TIMELINE
// ══════════════════════════════════════════════════
function genActivityId() {
  return 'act_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
}

function fmtTimelineTime(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit' }) +
         ' ' + d.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
}

function renderTimelineList(logs) {
  if (!logs || logs.length === 0) {
    return '<div class="timeline-empty">尚無紀錄，新增第一筆吧。</div>';
  }

  // 由新到舊排序（依 createdAt，Firestore Timestamp 物件需轉成 millis 比較）
  const sorted = [...logs].sort((a, b) => {
    const ta = a.createdAt && a.createdAt.toMillis ? a.createdAt.toMillis() : (a.createdAt ? new Date(a.createdAt).getTime() : 0);
    const tb = b.createdAt && b.createdAt.toMillis ? b.createdAt.toMillis() : (b.createdAt ? new Date(b.createdAt).getTime() : 0);
    return tb - ta;
  });

  return sorted.map((log, idx) => `
    <div class="timeline-entry">
      <div class="timeline-dot-col">
        <div class="timeline-dot type-${log.type}"></div>
        ${idx < sorted.length - 1 ? '<div class="timeline-line"></div>' : ''}
      </div>
      <div class="timeline-body">
        <div class="timeline-meta">
          <span class="timeline-type-tag type-${log.type}">${ACTIVITY_TYPE_LABELS[log.type] || log.type}</span>
          <span class="timeline-time">${fmtTimelineTime(log.createdAt)}</span>
          <span class="timeline-by">by ${escapeHtml(log.createdBy || 'me')}</span>
        </div>
        <div class="timeline-content">${escapeHtml(log.content || '')}</div>
      </div>
      <button class="timeline-delete-btn" onclick="deleteActivityLog('${log.id}')" title="刪除這筆紀錄">✕</button>
    </div>`).join('');
}

// ── 新增紀錄：讀取現有 activityLogs 後合併，不覆蓋原資料 ──
async function addActivityLog() {
  if (!currentId) return;

  const typeEl    = document.getElementById('timelineType');
  const contentEl = document.getElementById('timelineContent');
  const btn       = document.getElementById('timelineAddBtn');

  const content = contentEl.value.trim();
  if (!content) { showToast('請輸入紀錄內容'); return; }

  btn.disabled = true;
  btn.textContent = '新增中…';

  const newEntry = {
    id:        genActivityId(),
    type:      typeEl.value,
    content:   content,
    createdAt: firebase.firestore.Timestamp.now(),  // client timestamp（陣列內無法用 serverTimestamp）
    createdBy: 'me',
  };

  try {
    // 用 arrayUnion 合併寫入，不影響文件其他欄位
    await db.collection('quotes').doc(currentId).update({
      activityLogs: firebase.firestore.FieldValue.arrayUnion(newEntry),
    });

    // 同步更新本地快取與畫面
    if (!currentData.activityLogs) currentData.activityLogs = [];
    currentData.activityLogs.push(newEntry);
    document.getElementById('timelineList').innerHTML = renderTimelineList(currentData.activityLogs);

    contentEl.value = '';
    showToast('✓ 已新增紀錄');
  } catch (err) {
    console.error(err);
    showToast(`⚠ 新增失敗：${err.message || err}`);
  } finally {
    btn.disabled = false;
    btn.textContent = '新增紀錄';
  }
}

// ── 刪除紀錄：用 arrayRemove 需要完整物件比對，改用「讀取全部 → 過濾 → 整批寫回」較穩定 ──
async function deleteActivityLog(logId) {
  if (!currentId) return;
  if (!confirm('確定要刪除這筆紀錄嗎？')) return;

  const updatedLogs = (currentData.activityLogs || []).filter(log => log.id !== logId);

  try {
    await db.collection('quotes').doc(currentId).update({
      activityLogs: updatedLogs,
    });

    currentData.activityLogs = updatedLogs;
    document.getElementById('timelineList').innerHTML = renderTimelineList(currentData.activityLogs);
    showToast('✓ 已刪除紀錄');
  } catch (err) {
    console.error(err);
    showToast(`⚠ 刪除失敗：${err.message || err}`);
  }
}

function onProgressInput(val) {
  document.getElementById('progressValue').textContent = `${val}%`;
  document.getElementById('progressFill').style.width = `${val}%`;
  markDirty();
}

function markDirty() {
  dirty = true;
  const s = document.getElementById('saveStatus');
  if (s) { s.textContent = '尚未儲存'; s.className = 'save-status'; }
}

// ══════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════
function tsToLocalInput(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

// ══════════════════════════════════════════════════
//  SAVE
// ══════════════════════════════════════════════════
async function saveChanges() {
  if (!currentId) return;
  const btn = document.getElementById('saveBtn');
  const statusEl = document.getElementById('saveStatus');

  btn.disabled = true;
  statusEl.textContent = '儲存中…';
  statusEl.className = 'save-status saving';

  const officialPriceRaw = document.getElementById('f-officialPrice').value;
  const lastContactRaw   = document.getElementById('f-lastContactAt').value;

  const payload = {
    officialPrice: officialPriceRaw === '' ? null : Number(officialPriceRaw),
    progress:      Number(document.getElementById('f-progress').value),
    paymentStatus: document.getElementById('f-paymentStatus').value,
    notes:         document.getElementById('f-notes').value,
    status:        document.getElementById('f-status').value,
    priority:      document.getElementById('f-priority').value,
    source:        document.getElementById('f-source').value,
    assignedTo:    document.getElementById('f-assignedTo').value,
    lastContactAt: lastContactRaw ? firebase.firestore.Timestamp.fromDate(new Date(lastContactRaw)) : null,
    updatedAt:     firebase.firestore.FieldValue.serverTimestamp(),
  };

  try {
    await db.collection('quotes').doc(currentId).update(payload);
    dirty = false;
    statusEl.textContent = '✓ 已儲存';
    statusEl.className = 'save-status saved';
    setTimeout(() => { if (!dirty) statusEl.textContent = ''; }, 2500);
  } catch (err) {
    console.error(err);
    statusEl.textContent = '⚠ 儲存失敗';
    statusEl.className = 'save-status error';
    showToast(`⚠ 儲存失敗：${err.message || err}`);
  } finally {
    btn.disabled = false;
  }
}

// 離開頁面前若有未儲存變更，提醒一下
window.addEventListener('beforeunload', (e) => {
  if (dirty) { e.preventDefault(); e.returnValue = ''; }
});

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
loadDetail();
</script>
