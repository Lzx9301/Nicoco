<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>網站開發估價系統</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  /* ─── Reset & Base ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #ffffff;
    --gray-50: #f9fafb;
    --gray-100: #f3f4f6;
    --gray-200: #e5e7eb;
    --gray-300: #d1d5db;
    --gray-400: #9ca3af;
    --gray-500: #6b7280;
    --gray-600: #4b5563;
    --gray-700: #374151;
    --gray-800: #1f2937;
    --gray-900: #111827;
    --blue-50: #eff6ff;
    --blue-100: #dbeafe;
    --blue-500: #3b82f6;
    --blue-600: #2563eb;
    --blue-700: #1d4ed8;
    --green-50: #f0fdf4;
    --green-500: #22c55e;
    --amber-50: #fffbeb;
    --amber-500: #f59e0b;
    --radius-sm: 8px;
    --radius: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow: 0 4px 12px rgba(0,0,0,.06), 0 2px 6px rgba(0,0,0,.04);
    --shadow-lg: 0 12px 32px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.04);
    --transition: 180ms cubic-bezier(.4,0,.2,1);
    --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
  }

  html { scroll-behavior: smooth; }
  body {
    font-family: var(--font);
    background: var(--gray-50);
    color: var(--gray-800);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Layout ─── */
  .app-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(255,255,255,.88);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gray-200);
    padding: 0 24px;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .app-header .logo {
    font-size: 15px; font-weight: 600; color: var(--gray-900); letter-spacing: -.3px;
    display: flex; align-items: center; gap: 8px;
  }
  .app-header .logo span {
    display: inline-block; width: 26px; height: 26px; background: var(--gray-900);
    border-radius: 6px; color: #fff; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .header-meta { font-size: 13px; color: var(--gray-400); }

  .main-wrap {
    display: flex; align-items: flex-start;
    max-width: 1200px; margin: 0 auto;
    padding: 40px 24px 80px;
    gap: 28px;
  }

  /* ─── Step Progress ─── */
  .step-nav {
    display: flex; gap: 6px; align-items: center;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--gray-200); transition: var(--transition);
    cursor: pointer;
  }
  .step-dot.active { background: var(--gray-900); width: 24px; border-radius: 4px; }
  .step-dot.done { background: var(--gray-400); }

  /* ─── Form Area ─── */
  .form-area { flex: 1; min-width: 0; }

  .step-header { margin-bottom: 32px; }
  .step-eyebrow {
    font-size: 12px; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: var(--gray-400);
    margin-bottom: 8px;
  }
  .step-title {
    font-size: 26px; font-weight: 700; color: var(--gray-900);
    letter-spacing: -.5px; line-height: 1.25;
    margin-bottom: 6px;
  }
  .step-subtitle { font-size: 14px; color: var(--gray-500); line-height: 1.5; }

  /* ─── Cards ─── */
  .card-grid { display: grid; gap: 12px; }
  .card-grid.cols-2 { grid-template-columns: 1fr 1fr; }
  .card-grid.cols-1 { grid-template-columns: 1fr; }

  .option-card {
    position: relative;
    background: var(--white);
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-lg);
    padding: 20px;
    cursor: pointer;
    transition: border-color var(--transition), box-shadow var(--transition), transform var(--transition);
    user-select: none;
  }
  .option-card:hover {
    border-color: var(--gray-300);
    box-shadow: var(--shadow);
  }
  .option-card.selected {
    border-color: var(--gray-900);
    box-shadow: var(--shadow);
    background: var(--white);
  }
  .option-card.selected::after {
    content: '✓';
    position: absolute; top: 14px; right: 14px;
    width: 22px; height: 22px; background: var(--gray-900);
    color: #fff; border-radius: 50%;
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

  .card-title { font-size: 15px; font-weight: 600; color: var(--gray-900); margin-bottom: 4px; }
  .card-desc { font-size: 13px; color: var(--gray-500); line-height: 1.5; margin-bottom: 10px; }
  .card-price-label { font-size: 12px; color: var(--gray-400); margin-bottom: 2px; }
  .card-price { font-size: 16px; font-weight: 700; color: var(--gray-900); }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
  .tag {
    font-size: 11px; font-weight: 500; padding: 2px 8px;
    border-radius: 20px; background: var(--gray-100); color: var(--gray-500);
  }

  /* ─── Feature List ─── */
  .feature-section { margin-bottom: 28px; }
  .feature-section-title {
    font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
    color: var(--gray-400); margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--gray-100);
  }
  .feature-list { display: flex; flex-direction: column; gap: 8px; }

  .feature-item {
    background: var(--white);
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color var(--transition);
  }
  .feature-item.selected { border-color: var(--gray-900); }

  .feature-row {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; cursor: pointer;
  }
  .feature-checkbox {
    width: 18px; height: 18px; border-radius: 5px;
    border: 1.5px solid var(--gray-300);
    flex-shrink: 0; transition: var(--transition);
    display: flex; align-items: center; justify-content: center;
  }
  .feature-item.selected .feature-checkbox {
    background: var(--gray-900); border-color: var(--gray-900);
  }
  .feature-item.selected .feature-checkbox::after {
    content: ''; display: block;
    width: 4px; height: 7px;
    border: 2px solid #fff; border-top: none; border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }
  .feature-main { flex: 1; min-width: 0; }
  .feature-name { font-size: 14px; font-weight: 500; color: var(--gray-800); }
  .feature-badge {
    font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; margin-left: 6px;
    vertical-align: middle;
  }
  .badge-must { background: #fef2f2; color: #dc2626; }
  .badge-rec { background: var(--blue-50); color: var(--blue-600); }
  .badge-opt { background: var(--gray-100); color: var(--gray-500); }
  .badge-ent { background: #f5f3ff; color: #7c3aed; }

  .feature-price-range { font-size: 12px; color: var(--gray-400); flex-shrink: 0; }
  .feature-info-btn {
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--gray-100); color: var(--gray-400);
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; cursor: pointer;
    transition: var(--transition);
  }
  .feature-info-btn:hover { background: var(--gray-900); color: #fff; }
  .feature-expand {
    display: none; padding: 0 16px 14px 46px;
    font-size: 13px; color: var(--gray-500); line-height: 1.6;
    border-top: 1px solid var(--gray-100);
  }
  .feature-expand.open { display: block; padding-top: 12px; }
  .feature-expand ul { padding-left: 16px; }
  .feature-expand ul li { margin-bottom: 2px; }

  /* ─── Yes/No Question ─── */
  .question-block { margin-bottom: 28px; }
  .question-text { font-size: 16px; font-weight: 600; color: var(--gray-800); margin-bottom: 14px; }
  .yn-row { display: flex; gap: 10px; }
  .yn-btn {
    flex: 1; padding: 14px; border-radius: var(--radius);
    border: 1.5px solid var(--gray-200); background: var(--white);
    font-size: 14px; font-weight: 500; color: var(--gray-600);
    cursor: pointer; transition: var(--transition); text-align: center;
  }
  .yn-btn:hover { border-color: var(--gray-300); }
  .yn-btn.selected-yes { border-color: var(--gray-900); color: var(--gray-900); background: var(--white); }
  .yn-btn.selected-no { border-color: var(--gray-300); color: var(--gray-400); background: var(--gray-50); }

  .sub-features {
    margin-top: 14px; padding: 16px;
    background: var(--gray-50); border-radius: var(--radius);
    border: 1px solid var(--gray-200);
    display: none;
  }
  .sub-features.open { display: block; }
  .sub-features .feature-list { gap: 6px; }
  .sub-features .feature-item { background: var(--white); }

  /* ─── Step 8 — Conditions ─── */
  .conditions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .condition-group { background: var(--white); border: 1.5px solid var(--gray-200); border-radius: var(--radius-lg); padding: 20px; }
  .condition-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--gray-400); margin-bottom: 14px; }
  .condition-options { display: flex; flex-direction: column; gap: 8px; }
  .condition-option {
    padding: 10px 14px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--gray-200); background: var(--white);
    font-size: 14px; color: var(--gray-700);
    cursor: pointer; transition: var(--transition);
  }
  .condition-option:hover { border-color: var(--gray-300); }
  .condition-option.selected { border-color: var(--gray-900); color: var(--gray-900); font-weight: 500; }
  .condition-option .modifier { font-size: 12px; color: var(--gray-400); margin-left: 6px; }
  .condition-option.selected .modifier { color: var(--blue-500); }

  /* ─── Contact Form ─── */
  .contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-label { font-size: 13px; font-weight: 500; color: var(--gray-700); }
  .form-input, .form-textarea {
    padding: 10px 14px;
    border: 1.5px solid var(--gray-200); border-radius: var(--radius-sm);
    font-size: 14px; color: var(--gray-800); font-family: var(--font);
    background: var(--white); transition: var(--transition); outline: none;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--gray-900); }
  .form-textarea { resize: vertical; min-height: 90px; }

  /* ─── Navigation buttons ─── */
  .step-actions {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 36px; padding-top: 24px;
    border-top: 1px solid var(--gray-100);
  }
  .btn {
    padding: 10px 22px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: var(--transition); border: none; display: inline-flex;
    align-items: center; gap: 6px;
  }
  .btn-ghost {
    background: transparent; color: var(--gray-500);
    border: 1.5px solid var(--gray-200);
  }
  .btn-ghost:hover { border-color: var(--gray-300); color: var(--gray-700); }
  .btn-primary {
    background: var(--gray-900); color: #fff;
  }
  .btn-primary:hover { background: var(--gray-700); }
  .btn-primary:disabled { background: var(--gray-300); cursor: not-allowed; }

  /* ─── Summary Sidebar ─── */
  .summary-sidebar {
    width: 280px; flex-shrink: 0;
    position: sticky; top: 80px; max-height: calc(100vh - 100px);
    overflow-y: auto;
  }
  .summary-card {
    background: var(--white); border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-xl); padding: 22px;
    box-shadow: var(--shadow);
  }
  .summary-title {
    font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
    color: var(--gray-400); margin-bottom: 16px;
  }
  .summary-items { display: flex; flex-direction: column; gap: 0; margin-bottom: 16px; min-height: 40px; }
  .summary-item {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 6px 0; border-bottom: 1px solid var(--gray-100);
    font-size: 13px; animation: fadeInUp .2s ease;
  }
  .summary-item:last-child { border-bottom: none; }
  .summary-item-name { color: var(--gray-600); flex: 1; padding-right: 8px; }
  .summary-item-price { color: var(--gray-800); font-weight: 500; font-size: 12px; flex-shrink: 0; }
  .summary-empty { font-size: 13px; color: var(--gray-300); text-align: center; padding: 12px 0; }

  .summary-divider { height: 1px; background: var(--gray-100); margin: 14px 0; }

  .summary-total-label { font-size: 12px; color: var(--gray-400); margin-bottom: 4px; }
  .summary-total-price {
    font-size: 26px; font-weight: 800; color: var(--gray-900);
    letter-spacing: -1px; font-variant-numeric: tabular-nums;
    transition: color .2s;
  }
  .summary-range { font-size: 12px; color: var(--gray-400); margin-top: 3px; }

  .summary-duration {
    margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--gray-100);
  }
  .summary-duration-label { font-size: 12px; color: var(--gray-400); margin-bottom: 3px; }
  .summary-duration-value { font-size: 14px; font-weight: 600; color: var(--gray-700); }

  .summary-quote-id {
    margin-top: 10px; padding: 8px 12px;
    background: var(--gray-50); border-radius: var(--radius-sm);
    font-size: 11px; color: var(--gray-400); letter-spacing: .05em;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ─── Price Animation ─── */
  .price-change { color: var(--blue-500) !important; }

  /* ─── Final Summary Step ─── */
  .final-summary {
    background: var(--white); border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-xl); padding: 28px; margin-bottom: 24px;
  }
  .final-section { margin-bottom: 24px; }
  .final-section-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
    color: var(--gray-400); margin-bottom: 12px;
  }
  .final-price-block { text-align: center; padding: 24px; background: var(--gray-50); border-radius: var(--radius-lg); }
  .final-price-label { font-size: 13px; color: var(--gray-500); margin-bottom: 4px; }
  .final-price-main { font-size: 36px; font-weight: 800; color: var(--gray-900); letter-spacing: -1.5px; }
  .final-price-range { font-size: 14px; color: var(--gray-500); margin-top: 4px; }
  .final-price-note { font-size: 12px; color: var(--gray-400); margin-top: 8px; }
  .final-duration { font-size: 15px; font-weight: 600; color: var(--gray-700); margin-top: 10px; }

  .final-features { display: flex; flex-wrap: wrap; gap: 6px; }
  .final-feature-tag {
    font-size: 12px; padding: 4px 10px; border-radius: 20px;
    background: var(--gray-100); color: var(--gray-600); font-weight: 500;
  }

  /* ─── Quote ID banner ─── */
  .quote-banner {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--gray-900); color: #fff;
    border-radius: var(--radius-lg); padding: 16px 20px; margin-bottom: 20px;
  }
  .quote-banner-id { font-size: 16px; font-weight: 700; letter-spacing: .05em; }
  .quote-banner-note { font-size: 12px; color: rgba(255,255,255,.5); margin-top: 2px; }

  /* ─── Success Screen ─── */
  .success-screen {
    display: none; flex-direction: column; align-items: center;
    text-align: center; padding: 60px 24px;
  }
  .success-screen.show { display: flex; }
  .success-icon {
    width: 64px; height: 64px; border-radius: 50%; background: var(--gray-900);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 24px;
  }
  .success-title { font-size: 24px; font-weight: 700; color: var(--gray-900); margin-bottom: 10px; }
  .success-sub { font-size: 15px; color: var(--gray-500); line-height: 1.6; margin-bottom: 28px; }
  .success-id {
    background: var(--gray-100); border-radius: var(--radius);
    padding: 12px 24px; font-size: 14px; color: var(--gray-600);
    font-weight: 600; letter-spacing: .05em; margin-bottom: 32px;
  }
  .success-actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }

  /* ─── Tooltip ─── */
  .tooltip {
    position: absolute; z-index: 200;
    background: var(--gray-900); color: #fff;
    font-size: 12px; line-height: 1.5;
    padding: 10px 14px; border-radius: var(--radius-sm);
    max-width: 240px; pointer-events: none;
    box-shadow: var(--shadow-lg);
  }

  /* ─── RWD ─── */
  @media (max-width: 768px) {
    .main-wrap { flex-direction: column-reverse; padding: 20px 16px 60px; gap: 20px; }
    .summary-sidebar { width: 100%; position: static; max-height: none; }
    .card-grid.cols-2 { grid-template-columns: 1fr; }
    .conditions-grid { grid-template-columns: 1fr; }
    .contact-grid { grid-template-columns: 1fr; }
    .step-title { font-size: 22px; }
  }

  /* ─── Hidden ─── */
  [data-step] { display: none; }
  [data-step].active { display: block; }

  /* ─── Loading PDF ─── */
  .btn-download {
    background: var(--blue-600); color: #fff;
  }
  .btn-download:hover { background: var(--blue-700); }

  .form-input.error, .form-textarea.error { border-color: #dc2626; }
  .form-error-msg { font-size: 12px; color: #dc2626; margin-top: 3px; display: none; }
  .form-group.has-error .form-error-msg { display: block; }
  .form-group.has-error .form-input { border-color: #dc2626; }

  /* ─── Toast ─── */
  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--gray-900); color: #fff;
    padding: 12px 22px; border-radius: var(--radius); font-size: 14px;
    opacity: 0; pointer-events: none; transition: all .3s; z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .summary-sidebar::-webkit-scrollbar-track { background: transparent; }
  .summary-sidebar::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 2px; }
</style>
</head>
<body>

<!-- Header -->
<header class="app-header">
  <div class="logo">
    <span>W</span>
    網站開發估價系統
  </div>
  <div class="header-meta">僅供估算 · 正式報價需需求訪談確認</div>
</header>

<!-- Main -->
<div class="main-wrap">

  <!-- Form Area -->
  <div class="form-area">

    <!-- Step Progress -->
    <div class="step-nav" id="stepNav"></div>

    <!-- ── Step 1: 專案類型 ── -->
    <div data-step="1" class="active">
      <div class="step-header">
        <div class="step-eyebrow">Step 1 · 8</div>
        <div class="step-title">你的網站屬於哪種類型？</div>
        <div class="step-subtitle">選擇後會自動帶入必要功能配置，其他推薦項目可在後續步驟自行勾選。</div>
      </div>
      <div class="card-grid cols-1" style="gap:10px">
        <div class="option-card" data-type="brand-image" onclick="selectType(this,'brand-image')">
          <div class="card-title">形象網站</div>
          <div class="card-desc">展示公司品牌、服務與聯絡資訊。適合新創、顧問、中小企業做第一個官方網站。</div>
          <div class="card-price-label">專案管理費起跳</div>
          <div class="card-price">NT$8,000 起</div>
          <div style="font-size:11px;color:var(--gray-400);margin-top:4px;margin-bottom:6px">總價依選配頁面與功能而定</div>
          <div class="card-tags"><span class="tag">靜態為主</span><span class="tag">快速上線</span><span class="tag">SEO基礎</span></div>
        </div>
        <div class="option-card" data-type="brand-cms" onclick="selectType(this,'brand-cms')">
          <div class="card-title">品牌網站 + CMS</div>
          <div class="card-desc">具備後台管理、最新消息、SEO 設定，適合需要長期經營內容的品牌。</div>
          <div class="card-price-label">專案管理費起跳</div>
          <div class="card-price">NT$12,000 起</div>
          <div style="font-size:11px;color:var(--gray-400);margin-top:4px;margin-bottom:6px">總價依選配頁面與功能而定</div>
          <div class="card-tags"><span class="tag">CMS後台</span><span class="tag">SEO進階</span><span class="tag">多語系</span></div>
        </div>
        <div class="option-card" data-type="ecommerce" onclick="selectType(this,'ecommerce')">
          <div class="c
