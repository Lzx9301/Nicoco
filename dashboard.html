<style>
/* ── Tokens ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:    #0f1117; --ink-60: #60636e; --ink-30: #b8bac4; --ink-10: #f0f1f4;
  --white:  #ffffff;
  --accent: #2563eb; --accent-light: #eff6ff;
  --green:  #16a34a; --green-light:  #f0fdf4;
  --amber:  #d97706; --amber-light:  #fffbeb;
  --red:    #dc2626; --red-light:    #fef2f2;
  --purple: #7c3aed; --purple-light: #f5f3ff;

  --r-sm: 6px; --r: 10px; --r-lg: 16px; --r-xl: 20px;

  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  --ease: cubic-bezier(.25,.46,.45,.94); --t: 160ms;
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font); font-size: 14px; color: var(--ink);
  background: var(--ink-10); -webkit-font-smoothing: antialiased; min-height: 100vh;
}

/* ── Header ─────────────────────────────────────────────────── */
.header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 56px;
  background: rgba(255,255,255,.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--ink-10);
}
.header-left { display: flex; align-items: center; gap: 18px; }
.header-logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 600; color: var(--ink);
}
.header-logo-mark {
  width: 28px; height: 28px; background: var(--ink); border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 700;
}
.nav-link {
  font-size: 13px; color: var(--ink-60); text-decoration: none;
  transition: color var(--t); padding: 4px 0;
  border-bottom: 1.5px solid transparent;
}
.nav-link:hover { color: var(--ink); }
.nav-link.active { color: var(--ink); border-bottom-color: var(--ink); }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-email { font-size: 12px; color: var(--ink-30); }
.signout-btn {
  font-size: 12px; color: var(--ink-60); background: none; border: none;
  cursor: pointer; padding: 4px 8px; border-radius: var(--r-sm); transition: all var(--t);
}
.signout-btn:hover { color: var(--ink); background: var(--ink-10); }

/* ── Wrap ───────────────────────────────────────────────────── */
.wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }

/* ── Page header ─────────────────────────────────────────────── */
.page-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.page-title { font-size: 22px; font-weight: 800; color: var(--ink); letter-spacing: -.5px; }
.page-sub   { font-size: 13px; color: var(--ink-60); margin-top: 4px; }

/* ── Quick Actions ───────────────────────────────────────────── */
.quick-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.qa-btn {
  padding: 8px 16px; border-radius: var(--r-sm); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all var(--t); white-space: nowrap;
  text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font);
}
.qa-btn-ghost  { background: var(--white); border: 1.5px solid var(--ink-10); color: var(--ink-60); }
.qa-btn-ghost:hover { border-color: var(--ink-30); color: var(--ink); }
.qa-btn-danger { background: var(--white); border: 1.5px solid var(--ink-10); color: var(--ink-60); }
.qa-btn-danger:hover { border-color: var(--red); color: var(--red); }

/* ── Section Title ──────────────────────────────────────────── */
.section-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: var(--ink-30); margin-bottom: 12px; margin-top: 28px;
}

/* ── Stat / KPI Grid ────────────────────────────────────────── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.kpi-grid   { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

.stat-card {
  background: var(--white); border: 1.5px solid var(--ink-10); border-radius: var(--r-lg);
  padding: 18px 20px; transition: box-shadow var(--t);
}
.stat-card:hover { box-shadow: var(--shadow-sm); }
.stat-label {

}

}
.stat-sub  { font-size: 11px; color: var(--ink-30); margin-top: 4px; }
.stat-accent .stat-value { color: var(--accent); }

.stat-purple .stat-value { color: var(--purple); }

/* KPI cards — 大一點的數字，有輔助線 */
.kpi-card {

}
.kpi-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
}
.kpi-value {
  font-size: 28px; font-weight: 800; letter-spacing: -1px;

}
.kpi-value.money { font-size: 22px; }
.kpi-sub  { font-size: 11px; color: var(--ink-30); margin-top: 6px; }
.kpi-badge {

/* ── Today grid ──────────────────────────────────────────────── */
.today-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.today-card {

.today-card.red    .today-value { color: var(--red); }

/* ── Layout cols ─────────────────────────────────────────────── */
.two-col   { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }

/* ── Card ───────────────────────────────────────────────────── */

/* ── Pill / Badge ───────────────────────────────────────────── */

/* ── Empty / Loading ────────────────────────────────────────── */

/* ── Toast ──────────────────────────────────────────────────── */

<script>
// ══════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════
const STATUS_LABELS = {
  new:'新案件', contacted:'已聯絡', meeting:'需求訪談',
  quoted:'已報價', developing:'開發中', done:'完成', cancelled:'取消',
};
const ACTIVITY_TYPE_LABELS = {
  contact:'聯絡紀錄', meeting:'需求訪談', quote:'報價紀錄',
  payment:'付款紀錄', development:'開發進度', note:'一般備註',
};

// ══════════════════════════════════════════════════
//  AUTH GUARD
// ══════════════════════════════════════════════════
function guardAdmin(onPass) {
  auth.onAuthStateChanged(user => {
    if (!user) {
      window.location.replace(`admin-login.html?next=${encodeURIComponent(window.location.href)}`);
      return;
    }
    if (!ALLOWED_EMAILS.includes(user.email)) {
      auth.signOut(); window.location.replace('admin-login.html'); return;
    }
    document.getElementById('headerEmail').textContent = user.email;
    onPass();
  });
}
async function signOut() {
  await auth.signOut();
  window.location.replace('admin-login.html');
}

// ══════════════════════════════════════════════════
//  LOAD
// ══════════════════════════════════════════════════
async function loadDashboard() {
  try {
    const snap = await db.collection('quotes').orderBy('createdAt', 'desc').get();
    const all  = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render(all);
  } catch (err) {
    document.getElementById('wrap').innerHTML =
      `<div class="loading-state" style="color:var(--red)">⚠ 讀取失敗：${escapeHtml(err.message || String(err))}</div>`;
  }
}

// ══════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════
function tsToMs(ts) {
  if (!ts) return 0;
  return ts.toMillis ? ts.toMillis() : new Date(ts).getTime();
}
function fmtMoney(n) { return `NT$${Number(n || 0).toLocaleString()}`; }
function fmtMoneyShort(n) {
  const v = Number(n || 0);
  if (v >= 1000000) return `NT$${(v/1000000).toFixed(1)}M`;
  if (v >= 1000)    return `NT$${(v/1000).toFixed(0)}K`;
  return fmtMoney(v);
}
function fmtDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('zh-TW', { month:'2-digit', day:'2-digit' });
}
function fmtDateFull(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit' });
}
function fmtDatetime(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('zh-TW', { month:'2-digit', day:'2-digit' }) +
    ' ' + d.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
}
function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, c =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function isExpiredTs(ts) {
  if (!ts) return false;
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d < new Date();
}
// 取案件的「成交日期」：quotationUpdatedAt → updatedAt → createdAt
function wonMs(q) {
  return tsToMs(q.quotationUpdatedAt) || tsToMs(q.updatedAt) || tsToMs(q.createdAt);
}
// 取案件的「金額」：quotationTotal → officialPrice
function wonAmount(q) {
  return Number(q.quotationTotal || q.officialPrice || 0);
}

// ══════════════════════════════════════════════════
//  CALCULATIONS
// ══════════════════════════════════════════════════
function getMonthBounds() {
  const now   = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), 1);
  const end   = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59);
  return { startMs: start.getTime(), endMs: end.getTime() };
}

function calcStats(all) {
  const { startMs, endMs } = getMonthBounds();
  const now = new Date();

  // ── 整體 ──────────────────────────────────────
  let total = all.length, newCount = 0, developing = 0, done = 0;
  // ── 今日工作 ──────────────────────────────────
  let needContact = 0, waitingConfirm = 0, inDev = 0, waitingPayment = 0;
  // ── 本月 ──────────────────────────────────────
  let monthNew = 0, monthRevenue = 0, monthRevenueCount = 0;
  // ── KPI ───────────────────────────────────────
  let kpiRevenue = 0, kpiWon = 0;       // 本月成交
  let totalWon = 0, totalWonCount = 0;  // 全部成交（算平均客單）
  let hasQuotation = 0;                 // 有報價的案件（算成交率分母）
  let pendingPayment = 0;               // 待收款金額
  let pendingPaymentCount = 0;
  let pendingQuote = 0;                 // 待處理報價數（sent）
  // ── 報價狀態摘要 ──────────────────────────────
  let qDraft = 0, qSent = 0, qAccepted = 0, qRejected = 0, qNone = 0;
  // ── 逾期報價 ──────────────────────────────────
  const overdueItems = [];
  // ── 待收款列表 ────────────────────────────────
  const pendingPayItems = [];

  all.forEach(q => {
    const status  = q.status || 'new';
    const qStatus = q.quotationStatus || '';
    const amount  = wonAmount(q);
    const createdMs = tsToMs(q.createdAt);

    // 整體計數
    if (status === 'new')        newCount++;
    if (status === 'developing') developing++;
    if (status === 'done')       done++;

    // 今日工作
    if (status === 'new' || status === 'contacted') needContact++;
    if (qStatus === 'sent')  waitingConfirm++;
    if (status === 'developing') inDev++;
    if (qStatus === 'accepted' && q.paymentStatus !== 'paid') {
      waitingPayment++;
      if (amount > 0) { pendingPayment += amount; pendingPaymentCount++; }
      pendingPayItems.push(q);
    }

    // 本月新案件
    if (createdMs >= startMs && createdMs <= endMs) monthNew++;

    // 成交判定
    const isWon = status === 'done' || qStatus === 'accepted';

    // 全部成交（平均客單）
    if (isWon && amount > 0) { totalWon += amount; totalWonCount++; }

    // 本月成交（日期用 wonMs）
    const wMs = wonMs(q);
    if (isWon && amount > 0 && wMs >= startMs && wMs <= endMs) {
      kpiRevenue += amount; kpiWon++;
    }

    // 有報價的案件（成交率分母）
    const hasQ = (amount > 0) || ['sent','accepted','rejected'].includes(qStatus);
    if (hasQ) hasQuotation++;

    // 待處理報價
    if (qStatus === 'sent') pendingQuote++;

    // 報價狀態摘要
    if (!qStatus || qStatus === '')   qNone++;
    else if (qStatus === 'draft')     qDraft++;
    else if (qStatus === 'sent')      qSent++;
    else if (qStatus === 'accepted')  qAccepted++;
    else if (qStatus === 'rejected')  qRejected++;

    // 逾期報價：validUntil 已過 & status 是 sent 或 draft
    if (isExpiredTs(q.validUntil) && (qStatus === 'sent' || qStatus === 'draft')) {
      overdueItems.push(q);
    }
  });

  const avgDeal     = totalWonCount > 0 ? Math.round(totalWon / totalWonCount) : 0;
  const closeRate   = hasQuotation > 0 ? Math.round((totalWonCount / hasQuotation) * 100) : 0;

  return {
    total, newCount, developing, done,
    needContact, waitingConfirm, inDev, waitingPayment, monthNew,
    kpiRevenue, kpiWon, avgDeal, closeRate,
    hasQuotation, totalWonCount,
    pendingPayment, pendingPaymentCount, pendingQuote,
    qDraft, qSent, qAccepted, qRejected, qNone,
    overdueItems:    overdueItems.sort((a,b) => tsToMs(a.validUntil) - tsToMs(b.validUntil)).slice(0,5),
    pendingPayItems: pendingPayItems.sort((a,b) => wonAmount(b) - wonAmount(a)).slice(0,5),
  };
}

function getActionItems(all) {
  return all.filter(q => q.status !== 'done' && q.status !== 'cancelled').slice(0, 5);
}
function collectTimeline(all) {
  const logs = [];
  all.forEach(q => {
    (q.activityLogs || []).forEach(log => {
      logs.push({ ...log, quoteId: q.quoteId || q.id, docId: q.id });
    });
  });
  logs.sort((a, b) => tsToMs(b.createdAt) - tsToMs(a.createdAt));
  return logs.slice(0, 10);
}

// ══════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════

  const now      = new Date();

            <div class="qr-name">${escapeHtml(q.name || '—')}</div>

        </div>

    const amount = wonAmount(q);

      <a class="qr-link" href="quote-detail.html?id=${encodeURIComponent(q.id)}">

          <div class="qr-id">${escapeHtml(q.quoteId || q.id)}</div>
          <div>
            <div class="qr-name">${escapeHtml(q.name || '—')}</div>
            <div class="qr-type">${escapeHtml(q.projectType || '—')}</div>
          </div>
          <div class="qr-amount">${amount > 0 ? fmtMoney(amount) : '—'}</div>
          <div class="qr-date">${fmtDate(q.createdAt)}</div>
        </div>
      </a>`;
  }

  // ── 逾期報價 row（顯示過期日） ──────────────────
  function overdueRow(q) {
    const qStatus = q.quotationStatus || '';
    const pill = qStatus === 'sent'
      ? `<span class="pill pill-quoted">已送出</span>`
      : `<span class="pill" style="background:var(--ink-10);color:var(--ink-30)">草稿</span>`;
    return `
      <a class="qr-link" href="quote-detail.html?id=${encodeURIComponent(q.id)}">
        <div class="quote-row">
          <div class="qr-id">${escapeHtml(q.quoteId || q.id)}</div>
          <div>
            <div class="qr-name">${escapeHtml(q.name || '—')}</div>
            <div class="qr-type">${escapeHtml(q.projectType || '—')}</div>
          </div>
          <div>${pill}</div>
          <div class="qr-overdue">到期 ${fmtDateFull(q.validUntil)}</div>
        </div>

  }

  // ── closeRate badge ─────────────────────────────
  const crBadge = s.closeRate >= 60 ? 'kpi-badge-green'
                : s.closeRate >= 30 ? 'kpi-badge-amber'
                : 'kpi-badge-red';

  document.getElementById('wrap').innerHTML = `
  <div class="wrap">

    <!-- Page header -->
    <div class="page-header">
      <div>
        <div class="page-title">工作台</div>
        <div class="page-sub">更新於 ${now.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' })} ・ <span style="cursor:pointer;color:var(--accent)" onclick="location.reload()">重新整理</span></div>
      </div>
      <div class="quick-actions">
        <a class="qa-btn qa-btn-ghost" href="quote-admin.html"><span>📋</span><span>查看所有案件</span></a>
        <button class="qa-btn qa-btn-ghost" onclick="location.reload()"><span>↻</span><span>重新整理</span></button>
        <button class="qa-btn qa-btn-danger" onclick="signOut()"><span>⎋</span><span>登出</span></button>
      </div>
    </div>

    <!-- ① KPI 主要指標 -->
    <div class="section-title">本月 KPI（${monthStr}）</div>
    <div class="kpi-grid">

      <div class="kpi-card">
        <div class="kpi-label">
          <span class="kpi-dot" style="background:var(--green)"></span>本月營收
        </div>
        <div class="kpi-value money">${s.kpiRevenue > 0 ? fmtMoney(s.kpiRevenue) : '—'}</div>
        <div class="kpi-sub">${s.kpiWon} 筆成交 ・ quotationUpdatedAt</div>
      </div>

      <div class="kpi-card">
        <div class="kpi-label">
          <span class="kpi-dot" style="background:var(--accent)"></span>成交率
        </div>
        <div class="kpi-value">${s.closeRate > 0 ? s.closeRate + '%' : '—'}</div>
        <div class="kpi-sub">${s.closeRate > 0 ? `${s.totalWonCount} 成交 / ${s.hasQuotation} 有報價` : '尚無報價資料'}</div>
        ${s.closeRate > 0 ? `<span class="kpi-badge ${crBadge}">${s.closeRate >= 60 ? '✓ 良好' : s.closeRate >= 30 ? '△ 普通' : '↓ 偏低'}</span>` : ''}
      </div>

      <div class="kpi-card">
        <div class="kpi-label">

        </div>
        <div class="kpi-value money">${s.avgDeal > 0 ? fmtMoney(s.avgDeal) : '—'}</div>
        <div class="kpi-sub">所有成交案件均價</div>
      </div>

      <div class="kpi-card">
        <div class="kpi-label">
          <span class="kpi-dot" style="background:var(--amber)"></span>待收款金額
        </div>

        <div class="kpi-sub">${s.pendingPaymentCount} 筆 ・ accepted 未付清</div>
        ${s.pendingPayment > 0 ? `<span class="kpi-badge kpi-badge-amber">待入帳</span>` : ''}
      </div>

    <div class="section-title">今日工作</div>
    <div class="today-grid">
      <a class="today-card accent" href="quote-admin.html">
        <div class="today-label">待聯絡</div>
        <div class="today-value">${s.needContact}</div>

      <a class="today-card amber" href="quote-admin.html">

            </div>
            <div class="ss-row">
              <span style="display:flex;align-items:center;gap:8px">
                <span class="ss-dot" style="background:#0891b2"></span>
                <span class="ss-label">已送出（等待客戶）</span>
              </span>
              <span class="ss-value">${s.qSent} 件</span>
            </div>
            <div class="ss-row">
              <span style="display:flex;align-items:center;gap:8px">
                <span class="ss-dot" style="background:var(--green)"></span>
                <span class="ss-label">已接受</span>
              </span>
              <span class="ss-value">${s.qAccepted} 件</span>
            </div>
            <div class="ss-row">
              <span style="display:flex;align-items:center;gap:8px">
                <span class="ss-dot" style="background:var(--red)"></span>
                <span class="ss-label">已拒絕</span>
              </span>
              <span class="ss-value">${s.qRejected} 件</span>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">
            逾期報價
            ${s.overdueItems.length > 0 ? `<span style="font-size:10px;color:var(--red);font-weight:700;text-transform:none;letter-spacing:0">⚠ ${s.overdueItems.length} 件需處理</span>` : ''}
          </div>
          ${s.overdueItems.length === 0
            ? '<div class="empty-row">✓ 無逾期報價</div>'

      <!-- 右：待收款 -->

        </div>

    <div class="card">

      ${action5.length === 0
        ? '<div class="empty-row">🎉 目前沒有待處理的案件</div>'

    <div class="stats-grid">
      <div class="stat-card">

        <div class="stat-value">${s.total}</div>
        <div class="stat-sub">歷史所有案件</div>

        <div class="stat-label">新案件</div>
        <div class="stat-value">${s.newCount}</div>
        <div class="stat-sub">status = new</div>
      </div>
      <div class="stat-card stat-amber">
        <div class="stat-label">開發中</div>
        <div class="stat-value">${s.developing}</div>
        <div class="stat-sub">status = developing</div>
      </div>
      <div class="stat-card stat-green">
        <div class="stat-label">已完成</div>
        <div class="stat-value">${s.done}</div>
        <div class="stat-sub">status = done</div>

    <!-- ⑥ 動態 -->
    <div class="section-title">動態</div>
    <div class="two-col">

      <div class="card">
        <div class="card-title">最近案件 <a href="quote-admin.html">查看全部 →</a></div>
        ${recent10.length === 0
          ? '<div class="empty-row">尚無案件</div>'

      <div class="card">

        ${tl.length === 0
          ? '<div class="empty-row">尚無活動紀錄</div>'
          : tl.map((log, idx) => `
            <div class="tl-entry">
              <div class="tl-dot-col">
                <div class="tl-dot type-${log.type}"></div>

                  <span class="tl-type-tag type-${log.type}">${ACTIVITY_TYPE_LABELS[log.type] || log.type}</span>

                  <span class="tl-time">${fmtDatetime(log.createdAt)}</span>
                </div>
                <div class="tl-content">${escapeHtml(log.content || '')}</div>
              </div>
            </div>`).join('')
        }
      </div>

    </div>
  </div>`;
}

guardAdmin(loadDashboard);
</script>
