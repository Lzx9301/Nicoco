<style>
/* ── Tokens ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:    #0f1117; --ink-60: #60636e; --ink-30: #b8bac4; --ink-10: #f0f1f4;
  --white:  #ffffff;
  --accent: #2563eb; --accent-light: #eff6ff;
  --green:  #16a34a; --green-light:  #f0fdf4;
  --amber:  #d97706; --amber-light:  #fffbeb;
  --red:    #dc2626;
  --purple: #7c3aed; --purple-light: #f5f3ff;

  --r-sm: 6px; --r: 10px; --r-lg: 16px; --r-xl: 20px;
  --shadow-sm: 0 1px 4px rgba(15,17,23,.06);
  --shadow:    0 4px 16px rgba(15,17,23,.08);
  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', 'PingFang TC', sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  --ease: cubic-bezier(.25,.46,.45,.94); --t: 160ms;
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font); font-size: 14px; color: var(--ink);
  background: var(--ink-10); -webkit-font-smoothing: antialiased; min-height: 100vh;
}

/* ── Header ─────────────────────────────────────────────────── */
.header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 56px;
  background: rgba(255,255,255,.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--ink-10);
}
.header-left { display: flex; align-items: center; gap: 18px; }
.header-logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 600; color: var(--ink);
}
.header-logo-mark {
  width: 28px; height: 28px; background: var(--ink); border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 700;
}
/* ② 導航改為「Dashboard」+「案件」 */
.nav-link {
  font-size: 13px; color: var(--ink-60); text-decoration: none;
  transition: color var(--t); padding: 4px 0;
  border-bottom: 1.5px solid transparent;
}
.nav-link:hover { color: var(--ink); }
.nav-link.active { color: var(--ink); border-bottom-color: var(--ink); }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-email { font-size: 12px; color: var(--ink-30); }
.signout-btn {
  font-size: 12px; color: var(--ink-60); background: none; border: none;
  cursor: pointer; padding: 4px 8px; border-radius: var(--r-sm); transition: all var(--t);
}
.signout-btn:hover { color: var(--ink); background: var(--ink-10); }

/* ── Wrap ───────────────────────────────────────────────────── */
.wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px; }

/* ── Page header + quick actions ─────────────────────────────── */
.page-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.page-header-text {}
.page-title { font-size: 22px; font-weight: 800; color: var(--ink); letter-spacing: -.5px; }
.page-sub { font-size: 13px; color: var(--ink-60); margin-top: 4px; }

/* ⑤ 快捷功能按鈕群 */
.quick-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.qa-btn {
  padding: 8px 16px; border-radius: var(--r-sm); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all var(--t); white-space: nowrap;
  text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font);
}
.qa-btn-ghost {
  background: var(--white); border: 1.5px solid var(--ink-10); color: var(--ink-60);
}
.qa-btn-ghost:hover { border-color: var(--ink-30); color: var(--ink); }
.qa-btn-primary { background: var(--ink); border: 1.5px solid var(--ink); color: #fff; }
.qa-btn-primary:hover { background: #2a2d38; }
.qa-btn-danger { background: var(--white); border: 1.5px solid var(--ink-10); color: var(--ink-60); }
.qa-btn-danger:hover { border-color: var(--red); color: var(--red); }

/* ── Section Title ──────────────────────────────────────────── */
.section-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: var(--ink-30); margin-bottom: 12px; margin-top: 28px;
}
.section-title:first-of-type { margin-top: 0; }

/* ── Stat Grid ──────────────────────────────────────────────── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.stat-card {
  background: var(--white); border: 1.5px solid var(--ink-10); border-radius: var(--r-lg);
  padding: 18px 20px; transition: box-shadow var(--t);
}
.stat-card:hover { box-shadow: var(--shadow-sm); }
.stat-label {
  font-size: 11px; color: var(--ink-30); margin-bottom: 8px;
  font-weight: 600; text-transform: uppercase; letter-spacing: .05em;
}
.stat-value {
  font-size: 26px; font-weight: 800; color: var(--ink);
  letter-spacing: -.8px; font-variant-numeric: tabular-nums;
}
.stat-sub { font-size: 11px; color: var(--ink-30); margin-top: 4px; }
.stat-accent .stat-value { color: var(--accent); }
.stat-amber  .stat-value { color: var(--amber); }
.stat-green  .stat-value { color: var(--green); }
.stat-purple .stat-value { color: var(--purple); }
.stat-red    .stat-value { color: var(--red); }

/* ③ 今日工作 — 稍微凸出一點 */
.today-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
}
.today-card {
  background: var(--white); border: 1.5px solid var(--ink-10); border-radius: var(--r-lg);
  padding: 16px 20px; transition: box-shadow var(--t), border-color var(--t);
  cursor: pointer; text-decoration: none; display: block; color: inherit;
}
.today-card:hover { box-shadow: var(--shadow-sm); border-color: var(--ink-30); }
.today-label {
  font-size: 11px; color: var(--ink-30); margin-bottom: 6px;
  font-weight: 600; text-transform: uppercase; letter-spacing: .05em;
}
.today-value {
  font-size: 28px; font-weight: 800; letter-spacing: -.8px;
  font-variant-numeric: tabular-nums;
}
.today-hint { font-size: 11px; color: var(--ink-30); margin-top: 3px; }
.today-card.accent .today-value { color: var(--accent); }
.today-card.amber  .today-value { color: var(--amber); }
.today-card.red    .today-value { color: var(--red); }
.today-card.green  .today-value { color: var(--green); }

/* ④ 需要處理 + 兩欄佈局 */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }

/* ── Card ───────────────────────────────────────────────────── */
.card {
  background: var(--white); border: 1.5px solid var(--ink-10); border-radius: var(--r-xl);
  padding: 20px;
}
.card-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: var(--ink-30); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--ink-10);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title a {
  font-size: 11px; color: var(--accent); text-decoration: none;
  font-weight: 600; letter-spacing: 0; text-transform: none;
}
.card-title a:hover { text-decoration: underline; }

/* ── Quote rows ─────────────────────────────────────────────── */
.quote-row {
  display: grid; grid-template-columns: 110px 1fr 96px 80px;
  align-items: center; gap: 10px;
  padding: 9px 0; border-bottom: 1px solid var(--ink-10);
}
.quote-row:last-child { border-bottom: none; padding-bottom: 0; }
.qr-id   { font-family: var(--mono); font-size: 10px; color: var(--ink-30); }
.qr-name { font-size: 13px; font-weight: 500; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.qr-type { font-size: 11px; color: var(--ink-60); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.qr-date { font-size: 11px; color: var(--ink-30); text-align: right; }
.qr-link { text-decoration: none; color: inherit; display: contents; }
.quote-row:hover .qr-name { color: var(--accent); }

/* ── Pill / status badge ────────────────────────────────────── */
.pill {
  display: inline-block; font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 20px; white-space: nowrap;
}
.pill-new        { background: var(--accent-light); color: var(--accent); }
.pill-contacted  { background: var(--purple-light); color: var(--purple); }
.pill-meeting    { background: var(--amber-light); color: var(--amber); }
.pill-quoted     { background: #ecfeff; color: #0891b2; }
.pill-developing { background: #fff7ed; color: #ea580c; }
.pill-done       { background: var(--green-light); color: var(--green); }
.pill-cancelled  { background: var(--ink-10); color: var(--ink-30); }

/* ── Timeline ───────────────────────────────────────────────── */
.tl-entry {
  display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--ink-10);
}
.tl-entry:last-child { border-bottom: none; padding-bottom: 0; }
.tl-dot-col { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
.tl-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--ink-30);
  margin-top: 5px; flex-shrink: 0;
}
.tl-dot.type-contact     { background: var(--accent); }
.tl-dot.type-meeting     { background: var(--amber); }
.tl-dot.type-quote       { background: #0891b2; }
.tl-dot.type-payment     { background: var(--green); }
.tl-dot.type-development { background: #ea580c; }
.tl-dot.type-note        { background: var(--ink-30); }
.tl-line { flex: 1; width: 1px; background: var(--ink-10); margin-top: 4px; }
.tl-body { flex: 1; min-width: 0; }
.tl-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; flex-wrap: wrap; }
.tl-type-tag {
  font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px;
  text-transform: uppercase; letter-spacing: .04em;
}
.tl-type-tag.type-contact     { background: var(--accent-light); color: var(--accent); }
.tl-type-tag.type-meeting     { background: var(--amber-light); color: var(--amber); }
.tl-type-tag.type-quote       { background: #ecfeff; color: #0891b2; }
.tl-type-tag.type-payment     { background: var(--green-light); color: var(--green); }
.tl-type-tag.type-development { background: #fff7ed; color: #ea580c; }
.tl-type-tag.type-note        { background: var(--ink-10); color: var(--ink-60); }
.tl-qid  { font-size: 10px; color: var(--accent); font-family: var(--mono); text-decoration: none; }
.tl-qid:hover { text-decoration: underline; }
.tl-time { font-size: 10px; color: var(--ink-30); margin-left: auto; white-space: nowrap; }
.tl-content {
  font-size: 12px; color: var(--ink-60); line-height: 1.5;
  overflow: hidden; display: -webkit-box;
  -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}

/* ── Empty / Loading ────────────────────────────────────────── */
.empty-row { font-size: 13px; color: var(--ink-30); padding: 12px 0; }
.loading-state { text-align: center; padding: 80px 0; color: var(--ink-30); font-size: 14px; }
.loading-state .spinner {
  width: 24px; height: 24px; border: 2.5px solid var(--ink-10); border-top-color: var(--ink);
  border-radius: 50%; margin: 0 auto 14px; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── RWD ────────────────────────────────────────────────────── */
@media (max-width: 900px) {
  .stats-grid, .today-grid { grid-template-columns: 1fr 1fr; }
  .two-col { grid-template-columns: 1fr; }
  .quote-row { grid-template-columns: 1fr auto; row-gap: 2px; }
  .qr-id { display: none; }
}
@media (max-width: 600px) {
  .header { padding: 0 16px; }
  .wrap { padding: 20px 16px 60px; }
  .quick-actions .qa-btn span.qa-label { display: none; }
}
</style>

<header class="header">
  <div class="header-left">
    <div class="header-logo">
      <div class="header-logo-mark">W</div>
      工作台
    </div>
    <!-- ② 導航：Dashboard + 案件 -->
    <nav style="display:flex;gap:16px">
      <a class="nav-link active" href="dashboard.html">Dashboard</a>

      <a class="nav-link" href="settings.html">設定</a>
    </nav>
  </div>
  <div class="header-right">
    <span class="header-email" id="headerEmail"></span>
    <button class="signout-btn" onclick="signOut()">登出</button>
  </div>
</header>

<div id="wrap">
  <div class="loading-state"><div class="spinner"></div>載入中…</div>
</div>

<script>
// ══════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════
const STATUS_LABELS = {
  new:'新案件', contacted:'已聯絡', meeting:'需求訪談',
  quoted:'已報價', developing:'開發中', done:'完成', cancelled:'取消',
};
const ACTIVITY_TYPE_LABELS = {
  contact:'聯絡紀錄', meeting:'需求訪談', quote:'報價紀錄',
  payment:'付款紀錄', development:'開發進度', note:'一般備註',
};

// ══════════════════════════════════════════════════
//  AUTH GUARD
// ══════════════════════════════════════════════════
function guardAdmin(onPass) {
  auth.onAuthStateChanged(user => {
    if (!user) {
      window.location.replace(`admin-login.html?next=${encodeURIComponent(window.location.href)}`);
      return;
    }
    if (!ALLOWED_EMAILS.includes(user.email)) {
      auth.signOut();
      window.location.replace('admin-login.html');
      return;
    }
    document.getElementById('headerEmail').textContent = user.email;
    onPass();
  });
}
async function signOut() {
  await auth.signOut();
  window.location.replace('admin-login.html');
}

// ══════════════════════════════════════════════════
//  LOAD
// ══════════════════════════════════════════════════
async function loadDashboard() {
  try {
    const snap = await db.collection('quotes').orderBy('createdAt', 'desc').get();
    const all  = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    render(all);
  } catch (err) {
    document.getElementById('wrap').innerHTML =
      `<div class="loading-state" style="color:var(--red)">⚠ 讀取失敗：${escapeHtml(err.message || String(err))}</div>`;
  }
}

// ══════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════
function tsToMs(ts) {
  if (!ts) return 0;
  return ts.toMillis ? ts.toMillis() : new Date(ts).getTime();
}
function fmtMoney(n) { return `NT$${Number(n || 0).toLocaleString()}`; }
function fmtDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('zh-TW', { month:'2-digit', day:'2-digit' });
}
function fmtDatetime(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('zh-TW', { month:'2-digit', day:'2-digit' }) +
    ' ' + d.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' });
}
function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, c =>
    ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

// ══════════════════════════════════════════════════
//  CALCULATIONS
// ══════════════════════════════════════════════════
function getMonthBounds() {
  const now   = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), 1);
  const end   = new Date(now.getFullYear(), now.getMonth() + 1, 0, 23, 59, 59);
  return { startMs: start.getTime(), endMs: end.getTime() };
}

function calcStats(all) {
  const { startMs, endMs } = getMonthBounds();

  // 整體
  let newCount   = 0, developing = 0, done = 0;
  let monthNew   = 0;
  // ③ 今日工作四項
  let needContact    = 0;   // status: new | contacted
  let waitingConfirm = 0;   // quotationStatus: sent
  let inDev          = 0;   // status: developing
  let waitingPayment = 0;   // quotationStatus: accepted && paymentStatus != paid
  // ⑥ 本月成交（用 quotationUpdatedAt，沒有才退回 createdAt）
  let monthRevenue   = 0, revenueCount = 0;

  all.forEach(q => {
    const status = q.status || 'new';

    if (status === 'new')        newCount++;
    if (status === 'developing') developing++;
    if (status === 'done')       done++;

    const createdMs = tsToMs(q.createdAt);
    if (createdMs >= startMs && createdMs <= endMs) monthNew++;

    // ③ 今日工作統計
    if (status === 'new' || status === 'contacted')      needContact++;
    if (q.quotationStatus === 'sent')                     waitingConfirm++;
    if (status === 'developing')                           inDev++;
    if (q.quotationStatus === 'accepted' && q.paymentStatus !== 'paid') waitingPayment++;

    // ⑥ 本月成交：用 quotationUpdatedAt（沒有才退回 createdAt）
    const isWon  = status === 'done' || q.quotationStatus === 'accepted';
    const amount = Number(q.quotationTotal || q.officialPrice || 0);
    const wonMs  = tsToMs(q.quotationUpdatedAt) || createdMs;
    if (isWon && amount > 0 && wonMs >= startMs && wonMs <= endMs) {
      monthRevenue += amount;
      revenueCount++;
    }
  });

  const avgDeal = revenueCount > 0 ? Math.round(monthRevenue / revenueCount) : 0;

  return {
    total: all.length, newCount, developing, done,
    monthNew, monthRevenue, avgDeal,
    // 今日工作
    needContact, waitingConfirm, inDev, waitingPayment,
  };
}

// ④ 最近需要處理（排除 done / cancelled，最多 5 筆，已依 createdAt desc 排列）
function getActionItems(all) {
  return all
    .filter(q => q.status !== 'done' && q.status !== 'cancelled')
    .slice(0, 5);
}

// Timeline 彙整，取最新 10 筆
function collectTimeline(all) {
  const logs = [];
  all.forEach(q => {
    (q.activityLogs || []).forEach(log => {
      logs.push({ ...log, quoteId: q.quoteId || q.id, docId: q.id });
    });
  });
  logs.sort((a, b) => tsToMs(b.createdAt) - tsToMs(a.createdAt));
  return logs.slice(0, 10);
}

// ══════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════
function render(all) {
  const s        = calcStats(all);
  const tl       = collectTimeline(all);
  const recent10 = all.slice(0, 10);
  const action5  = getActionItems(all);
  const now      = new Date();
  const monthStr = `${now.getFullYear()} 年 ${now.getMonth() + 1} 月`;

  // ── 渲染 quote-row ──────────────────────────────
  function quoteRowHtml(q, showDate = true) {
    const statusClass = `pill-${q.status || 'new'}`;
    const statusLabel = STATUS_LABELS[q.status] || q.status || '新案件';
    return `
      <a class="qr-link" href="quote-detail.html?id=${encodeURIComponent(q.id)}">
        <div class="quote-row">
          <div class="qr-id">${escapeHtml(q.quoteId || q.id)}</div>
          <div>
            <div class="qr-name">${escapeHtml(q.name || '—')}</div>
            <div class="qr-type">${escapeHtml(q.projectType || '—')}</div>
          </div>
          <div><span class="pill ${statusClass}">${statusLabel}</span></div>
          <div class="qr-date">${showDate ? fmtDate(q.createdAt) : ''}</div>
        </div>
      </a>`;
  }

  document.getElementById('wrap').innerHTML = `
  <div class="wrap">

    <!-- Page header + ⑤ 快捷功能 -->
    <div class="page-header">
      <div class="page-header-text">
        <div class="page-title">工作台</div>
        <div class="page-sub">更新於 ${now.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' })}</div>
      </div>
      <div class="quick-actions">
        <a class="qa-btn qa-btn-ghost" href="quote-admin.html">
          <span>📋</span><span class="qa-label">查看所有案件</span>
        </a>
        <a class="qa-btn qa-btn-ghost" href="quote-edit.html?id=">
          <span>📝</span><span class="qa-label">新增正式報價</span>
        </a>
        <button class="qa-btn qa-btn-ghost" onclick="location.reload()">
          <span>↻</span><span class="qa-label">重新整理</span>
        </button>
        <button class="qa-btn qa-btn-danger" onclick="signOut()">
          <span>⎋</span><span class="qa-label">登出</span>
        </button>
      </div>
    </div>

    <!-- ③ 今日工作 -->
    <div class="section-title">今日工作</div>
    <div class="today-grid">
      <a class="today-card accent" href="quote-admin.html?filter=new">
        <div class="today-label">待聯絡</div>
        <div class="today-value">${s.needContact}</div>
        <div class="today-hint">new + contacted</div>
      </a>
      <a class="today-card amber" href="quote-admin.html?filter=quoted">
        <div class="today-label">等待客戶確認</div>
        <div class="today-value">${s.waitingConfirm}</div>
        <div class="today-hint">quotationStatus = sent</div>
      </a>
      <a class="today-card red" href="quote-admin.html?filter=developing">
        <div class="today-label">開發中</div>
        <div class="today-value">${s.inDev}</div>
        <div class="today-hint">status = developing</div>
      </a>
      <a class="today-card green" href="quote-admin.html?filter=accepted">
        <div class="today-label">等待付款</div>
        <div class="today-value">${s.waitingPayment}</div>
        <div class="today-hint">accepted &amp; 未付清</div>
      </a>
    </div>

    <!-- ④ 最近需要處理 -->
    <div class="section-title">最近需要處理</div>
    <div class="card">
      <div class="card-title">
        進行中案件
        <a href="quote-admin.html">查看全部 →</a>
      </div>
      ${action5.length === 0
        ? '<div class="empty-row">🎉 目前沒有待處理的案件</div>'
        : action5.map(q => quoteRowHtml(q)).join('')
      }
    </div>

    <!-- 整體概覽 -->
    <div class="section-title">整體概覽</div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">總案件數</div>
        <div class="stat-value">${s.total}</div>
        <div class="stat-sub">歷史所有案件</div>
      </div>
      <div class="stat-card stat-accent">
        <div class="stat-label">新案件</div>
        <div class="stat-value">${s.newCount}</div>
        <div class="stat-sub">status = new</div>
      </div>
      <div class="stat-card stat-amber">
        <div class="stat-label">開發中</div>
        <div class="stat-value">${s.developing}</div>
        <div class="stat-sub">status = developing</div>
      </div>
      <div class="stat-card stat-green">
        <div class="stat-label">已完成</div>
        <div class="stat-value">${s.done}</div>
        <div class="stat-sub">status = done</div>
      </div>
    </div>

    <!-- 本月 -->
    <div class="section-title">本月（${monthStr}）</div>
    <div class="stats-grid">
      <div class="stat-card stat-accent">
        <div class="stat-label">新案件</div>
        <div class="stat-value">${s.monthNew}</div>
        <div class="stat-sub">本月新進案件</div>
      </div>
      <div class="stat-card stat-green">
        <div class="stat-label">成交金額</div>
        <div class="stat-value" style="font-size:${s.monthRevenue > 999999 ? '19px' : '26px'}">
          ${s.monthRevenue > 0 ? fmtMoney(s.monthRevenue) : '—'}
        </div>
        <div class="stat-sub">以 quotationUpdatedAt 計算</div>
      </div>
      <div class="stat-card stat-purple">
        <div class="stat-label">平均客單</div>
        <div class="stat-value" style="font-size:${s.avgDeal > 999999 ? '19px' : '26px'}">
          ${s.avgDeal > 0 ? fmtMoney(s.avgDeal) : '—'}
        </div>
        <div class="stat-sub">本月成交均價</div>
      </div>
      <div class="stat-card stat-amber">
        <div class="stat-label">待聯絡</div>
        <div class="stat-value">${s.needContact}</div>
        <div class="stat-sub">new + contacted</div>
      </div>
    </div>

    <!-- 動態：最近案件 + Timeline -->
    <div class="section-title">動態</div>
    <div class="two-col">

      <!-- 最近 10 筆案件 -->
      <div class="card">
        <div class="card-title">
          最近案件
          <a href="quote-admin.html">查看全部 →</a>
        </div>
        ${recent10.length === 0
          ? '<div class="empty-row">尚無案件</div>'
          : recent10.map(q => quoteRowHtml(q)).join('')
        }
      </div>

      <!-- 最近 10 筆 Timeline -->
      <div class="card">
        <div class="card-title">最新活動紀錄</div>
        ${tl.length === 0
          ? '<div class="empty-row">尚無活動紀錄</div>'
          : tl.map((log, idx) => `
            <div class="tl-entry">
              <div class="tl-dot-col">
                <div class="tl-dot type-${log.type}"></div>
                ${idx < tl.length - 1 ? '<div class="tl-line"></div>' : ''}
              </div>
              <div class="tl-body">
                <div class="tl-meta">
                  <span class="tl-type-tag type-${log.type}">${ACTIVITY_TYPE_LABELS[log.type] || log.type}</span>
                  <a class="tl-qid" href="quote-detail.html?id=${encodeURIComponent(log.docId)}">${escapeHtml(log.quoteId)}</a>
                  <span class="tl-time">${fmtDatetime(log.createdAt)}</span>
                </div>
                <div class="tl-content">${escapeHtml(log.content || '')}</div>
              </div>
            </div>`).join('')
        }
      </div>

    </div><!-- /two-col -->
  </div><!-- /wrap -->`;
}

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
guardAdmin(loadDashboard);
</script>
</body>
</html>
