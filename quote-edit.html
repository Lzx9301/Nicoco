<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正式報價單</title>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>

  projectId:         'webproject-3914c',
  storageBucket:     'webproject-3914c.firebasestorage.app',

firebase.initializeApp(FB_CONFIG);
const db = firebase.firestore();

<style>
/* ── Tokens（沿用同一套設計語言）─────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:      #0f1117;
  --ink-60:   #60636e;
  --ink-30:   #b8bac4;
  --ink-10:   #f0f1f4;
  --white:    #ffffff;
  --accent:   #2563eb;
  --accent-light: #eff6ff;
  --green:    #16a34a;
  --green-light: #f0fdf4;
  --amber:    #d97706;
  --amber-light: #fffbeb;
  --red:      #dc2626;
  --purple:   #7c3aed;
  --purple-light: #f5f3ff;

  --r-sm: 6px;
  --r:    10px;
  --r-lg: 16px;
  --r-xl: 20px;

  --shadow-sm: 0 1px 4px rgba(15,17,23,.06);
  --shadow:    0 4px 16px rgba(15,17,23,.08);
  --shadow-lg: 0 12px 40px rgba(15,17,23,.10);

  --font: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', 'PingFang TC', sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;

  --ease: cubic-bezier(.25,.46,.45,.94);
  --t: 160ms;
}

html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.6;
  color: var(--ink);
  background: var(--ink-10);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── Header ─────────────────────────────────────────────────── */
.header {
  position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 56px;
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--ink-10);
}
.header-left { display: flex; align-items: center; gap: 14px; }
.back-link {
  font-size: 13px; color: var(--ink-60); text-decoration: none;
  display: flex; align-items: center; gap: 4px;
  transition: color var(--t);
}
.back-link:hover { color: var(--ink); }
.header-logo { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; color: var(--ink); }
.header-logo-mark {
  width: 28px; height: 28px; background: var(--ink); border-radius: var(--r-sm);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 700;
}
.header-note { font-size: 12px; color: var(--ink-30); font-family: var(--mono); }

/* ── Layout ─────────────────────────────────────────────────── */
.wrap { max-width: 920px; margin: 0 auto; padding: 32px 24px 100px; }

/* ── Card ───────────────────────────────────────────────────── */
.card {
  background: var(--white); border: 1.5px solid var(--ink-10); border-radius: var(--r-xl);
  padding: 24px; margin-bottom: 16px;
}
.card-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
  color: var(--ink-30); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--ink-10);
  display: flex; align-items: center; justify-content: space-between;
}

/* ── Customer info ──────────────────────────────────────────── */
.quote-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
.qh-id { font-family: var(--mono); font-size: 12px; color: var(--ink-30); margin-bottom: 4px; }
.qh-name { font-size: 22px; font-weight: 800; color: var(--ink); letter-spacing: -.5px; }
.qh-meta { font-size: 13px; color: var(--ink-60); margin-top: 4px; }
.status-badge {
  display: inline-block; font-size: 12px; font-weight: 600;
  padding: 5px 14px; border-radius: 20px; white-space: nowrap;
}
.qstatus-draft     { background: var(--ink-10); color: var(--ink-60); }
.qstatus-sent       { background: var(--accent-light); color: var(--accent); }
.qstatus-accepted   { background: var(--green-light); color: var(--green); }
.qstatus-rejected   { background: #fef2f2; color: var(--red); }

.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.info-box { padding: 10px 12px; background: var(--ink-10); border-radius: var(--r-sm); }
.info-label { font-size: 10px; color: var(--ink-30); margin-bottom: 2px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
.info-value { font-size: 13px; font-weight: 500; color: var(--ink); }

.tag-section { margin-top: 14px; }
.tag-section-label { font-size: 11px; font-weight: 600; color: var(--ink-60); margin-bottom: 6px; }
.tags { display: flex; flex-wrap: wrap; gap: 5px; }
.dtag { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: var(--ink-10); color: var(--ink-60); font-weight: 500; }
.dtag.eval { background: var(--amber-light); color: var(--amber); }
.tag-empty { font-size: 12px; color: var(--ink-30); }

/* ── Quotation items table ──────────────────────────────────── */
.qi-table { width: 100%; border-collapse: collapse; }
.qi-table thead th {
  font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
  color: var(--ink-30); text-align: left; padding: 0 8px 8px; border-bottom: 1px solid var(--ink-10);
}
.qi-table thead th.num { text-align: right; }
.qi-table tbody td { padding: 8px; vertical-align: top; border-bottom: 1px solid var(--ink-10); }
.qi-table tbody tr:last-child td { border-bottom: none; }

.qi-input, .qi-textarea {
  width: 100%; padding: 7px 9px; border: 1.5px solid var(--ink-10); border-radius: var(--r-sm);
  font-size: 13px; font-family: var(--font); color: var(--ink); background: var(--white);
  outline: none; transition: border-color var(--t);
}
.qi-input:focus, .qi-textarea:focus { border-color: var(--ink); }
.qi-input.num { text-align: right; font-variant-numeric: tabular-nums; }
.qi-textarea { resize: vertical; min-height: 36px; font-size: 12px; color: var(--ink-60); }
.qi-subtotal { font-size: 13px; font-weight: 600; color: var(--ink); text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; padding-top: 9px; }
.qi-delete-btn {
  width: 26px; height: 26px; border-radius: 50%; border: none; background: transparent;
  color: var(--ink-30); font-size: 13px; cursor: pointer; transition: all var(--t);
  display: flex; align-items: center; justify-content: center; margin-top: 4px;
}
.qi-delete-btn:hover { background: #fef2f2; color: var(--red); }

.qi-add-btn {
  margin-top: 12px; padding: 9px 18px; border-radius: var(--r-sm);
  border: 1.5px dashed var(--ink-30); background: var(--white);
  font-size: 13px; font-weight: 500; color: var(--ink-60);
  cursor: pointer; transition: all var(--t); width: 100%;
}
.qi-add-btn:hover { border-color: var(--ink); color: var(--ink); background: var(--ink-10); }

/* ── Totals ─────────────────────────────────────────────────── */
.totals-box { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--ink-10); }
.totals-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 13px; }
.totals-row .t-label { color: var(--ink-60); }
.totals-row .t-value { font-weight: 500; color: var(--ink); font-variant-numeric: tabular-nums; }
.totals-row.editable .t-input {
  width: 110px; padding: 6px 9px; border: 1.5px solid var(--ink-10); border-radius: var(--r-sm);
  font-size: 13px; text-align: right; font-family: var(--font); outline: none;
}
.totals-row.editable .t-input:focus { border-color: var(--ink); }
.totals-row.grand {
  border-top: 1.5px solid var(--ink); margin-top: 6px; padding-top: 12px;
}
.totals-row.grand .t-label { font-size: 14px; font-weight: 700; color: var(--ink); }
.totals-row.grand .t-value { font-size: 22px; font-weight: 800; color: var(--ink); letter-spacing: -.5px; }

/* ── Editable fields (terms) ────────────────────────────────── */
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.field-row:last-child { margin-bottom: 0; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field.full { grid-column: 1/-1; }
.field-label { font-size: 12px; font-weight: 500; color: var(--ink-60); }
.field-input, .field-select, .field-textarea {
  padding: 9px 12px; border: 1.5px solid var(--ink-10); border-radius: var(--r-sm);
  font-size: 13px; color: var(--ink); font-family: var(--font); background: var(--white);
  outline: none; transition: border-color var(--t);
}
.field-input:focus, .field-select:focus, .field-textarea:focus { border-color: var(--ink); }
.field-textarea { resize: vertical; min-height: 80px; }

/* ── Save bar ───────────────────────────────────────────────── */
.save-bar {
  position: sticky; bottom: 20px;
  display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-top: 8px;
}
.save-status { font-size: 12px; color: var(--ink-30); }
.save-status.saving { color: var(--accent); }
.save-status.saved  { color: var(--green); }
.save-status.error  { color: var(--red); }
.btn-save {
  padding: 11px 26px; border-radius: var(--r-sm); border: none;
  background: var(--ink); color: #fff; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background var(--t); box-shadow: var(--shadow);
}
.btn-save:hover { background: #2a2d38; }
.btn-save:disabled { background: var(--ink-30); cursor: not-allowed; }

/* ── Loading / Error ────────────────────────────────────────── */
.loading-state, .error-state { text-align: center; padding: 100px 0; color: var(--ink-30); font-size: 14px; }
.loading-state .spinner {
  width: 24px; height: 24px; border: 2.5px solid var(--ink-10); border-top-color: var(--ink);
  border-radius: 50%; margin: 0 auto 14px; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toast ──────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(16px);
  background: var(--ink); color: #fff; font-size: 13px;
  padding: 11px 20px; border-radius: var(--r); white-space: nowrap;
  opacity: 0; pointer-events: none; transition: all .25s var(--ease); z-index: 999;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── RWD ────────────────────────────────────────────────────── */
@media (max-width: 760px) {
  .info-grid, .field-row { grid-template-columns: 1fr; }
  .quote-header { flex-direction: column; }
  .qi-table thead { display: none; }
  .qi-table, .qi-table tbody, .qi-table tr, .qi-table td { display: block; width: 100%; }
  .qi-table tbody tr { border-bottom: 1px solid var(--ink-10); padding-bottom: 10px; margin-bottom: 10px; }
  .qi-table td { border-bottom: none; padding: 4px 0; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <a class="back-link" id="backLink" href="quote-admin.html">← 返回案件</a>
  </div>
  <div class="header-logo">
    <div class="header-logo-mark">W</div>
    正式報價單
  </div>
  <div class="header-note" id="headerQuoteId"></div>
</header>

<div class="wrap" id="wrap">
  <div class="loading-state"><div class="spinner"></div>載入案件中…</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════
const QSTATUS_LABELS = { draft:'草稿', sent:'已送出', accepted:'已接受', rejected:'已拒絕' };
const QSTATUS_ORDER  = ['draft','sent','accepted','rejected'];

const PAYMENT_TERMS_PRESETS = ['50% 訂金，50% 尾款', '一次付清', '分期付款', '自訂'];

let currentId = null;
let currentData = null;
let items = [];      // quotationItems 工作副本
let dirty = false;

// ══════════════════════════════════════════════════
//  GET ?id= FROM URL
// ══════════════════════════════════════════════════
function getIdFromUrl() {
  return new URLSearchParams(window.location.search).get('id');
}

// ══════════════════════════════════════════════════
//  LOAD
// ══════════════════════════════════════════════════
async function loadQuote() {
  currentId = getIdFromUrl();
  const wrap = document.getElementById('wrap');

  if (!currentId) {
    wrap.innerHTML = '<div class="error-state">⚠ 網址缺少案件 id 參數（例如 ?id=Q-20260701-123）</div>';
    return;
  }
  document.getElementById('backLink').href = `quote-detail.html?id=${encodeURIComponent(currentId)}`;

  try {
    const docSnap = await db.collection('quotes').doc(currentId).get();
    if (!docSnap.exists) {
      wrap.innerHTML = `<div class="error-state">⚠ 找不到案件：${escapeHtml(currentId)}</div>`;
      return;
    }
    currentData = docSnap.data();
    document.getElementById('headerQuoteId').textContent = currentData.quoteId || currentId;

    // 已有 quotationItems 就沿用，否則自動帶入預設項目
    items = (currentData.quotationItems && currentData.quotationItems.length > 0)
      ? currentData.quotationItems.map(i => ({ ...i }))
      : buildDefaultItems(currentData);

    renderPage();
  } catch (err) {
    console.error(err);
    wrap.innerHTML = `<div class="error-state">⚠ 讀取失敗：${escapeHtml(err.message || String(err))}</div>`;
  }
}

// ══════════════════════════════════════════════════
//  預設帶入：基礎建置費 + 加選功能（單價待手動輸入）
// ══════════════════════════════════════════════════
function genItemId() { return 'qi_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7); }

function buildDefaultItems(q) {
  const out = [];

  // ① 基礎建置費 — 用系統估算的中位數金額帶入，若無（客製評估）則留 0
  const basePrice = (q.priceMid !== null && q.priceMid !== undefined) ? Number(q.priceMid) : 0;
  out.push({
    id: genItemId(),
    name: '基礎建置費',
    description: `${q.projectType || ''}　含 RWD・基礎 SEO・SSL・部署・DNS`,
    qty: 1,
    unitPrice: basePrice,
    subtotal: basePrice,
  });

  // ② 加選功能 — selectedItems 是純名稱字串陣列，沒有單價資料，預設 0 元讓使用者手動填
  (q.selectedItems || []).forEach(name => {
    out.push({
      id: genItemId(),
      name: name,
      description: '',
      qty: 1,
      unitPrice: 0,
      subtotal: 0,
    });
  });

  // ③ 需評估項目 — 同樣先列出但金額 0，需求第 4 點要求「可先不計價，手動輸入」
  (q.evaluationItems || []).forEach(name => {
    out.push({
      id: genItemId(),
      name: `${name}（需評估）`,
      description: '依現場訪談結果調整費用',
      qty: 1,
      unitPrice: 0,
      subtotal: 0,
    });
  });

  return out;
}

// ══════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════
function fmtDate(ts) {
  if (!ts) return '—';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit' });
}
function fmtMoney(n) { return `NT$${Number(n||0).toLocaleString()}`; }

function fmtPriceRange(q) {
  if (q.priceMid === null || q.priceMid === undefined) return '需評估';
  return `${fmtMoney(q.priceMid)}（${q.priceRange || '—'}）`;
}

function renderPage() {
  const q = currentData;
  const wrap = document.getElementById('wrap');

  const selectedTags = (q.selectedItems || []).map(n => `<span class="dtag">${escapeHtml(n)}</span>`).join('');
  const evalTags      = (q.evaluationItems || []).map(n => `<span class="dtag eval">◆ ${escapeHtml(n)}</span>`).join('');

  const qStatus = q.quotationStatus || 'draft';

  wrap.innerHTML = `
    <!-- 客戶基本資料（唯讀） -->
    <div class="card">
      <div class="quote-header">
        <div>
          <div class="qh-id">${escapeHtml(q.quoteId || currentId)}</div>
          <div class="qh-name">${escapeHtml(q.name || '—')}　${q.company ? `<span style="font-size:14px;color:var(--ink-60);font-weight:500">／ ${escapeHtml(q.company)}</span>` : ''}</div>
          <div class="qh-meta">${escapeHtml(q.email || '—')} ・ ${escapeHtml(q.projectType || '—')}</div>
        </div>
        <span class="status-badge qstatus-${qStatus}" id="qStatusBadge">${QSTATUS_LABELS[qStatus]}</span>
      </div>
      <div class="info-grid">
        <div class="info-box"><div class="info-label">系統估算價格</div><div class="info-value">${fmtPriceRange(q)}</div></div>
        <div class="info-box"><div class="info-label">預估工期</div><div class="info-value">${escapeHtml(q.duration || '—')}</div></div>
      </div>
      <div class="tag-section">
        <div class="tag-section-label">加選功能（系統估價時選擇）</div>
        ${selectedTags ? `<div class="tags">${selectedTags}</div>` : '<div class="tag-empty">無</div>'}
      </div>
      <div class="tag-section">
        <div class="tag-section-label">需評估項目</div>
        ${evalTags ? `<div class="tags">${evalTags}</div>` : '<div class="tag-empty">無</div>'}
      </div>
    </div>

    <!-- 正式報價項目 -->
    <div class="card">
      <div class="card-title">正式報價項目</div>
      <table class="qi-table">
        <thead>
          <tr>
            <th style="width:22%">項目名稱</th>
            <th style="width:30%">說明</th>
            <th class="num" style="width:8%">數量</th>
            <th class="num" style="width:14%">單價</th>
            <th class="num" style="width:14%">小計</th>
            <th style="width:32px"></th>
          </tr>
        </thead>
        <tbody id="qiTableBody"></tbody>
      </table>
      <button class="qi-add-btn" onclick="addItem()">＋ 新增項目</button>

      <div class="totals-box">
        <div class="totals-row">
          <span class="t-label">項目小計</span>
          <span class="t-value" id="sumSubtotal">${fmtMoney(0)}</span>
        </div>
        <div class="totals-row editable">
          <span class="t-label">折扣（輸入金額，例如 5000）</span>
          <input class="t-input" id="f-discount" type="number" value="${q.quotationDiscount ?? 0}" oninput="recalcTotals()">
        </div>
        <div class="totals-row editable">
          <span class="t-label">稅金（輸入金額，例如 5%稅自行計算後填入）</span>
          <input class="t-input" id="f-tax" type="number" value="${q.quotationTax ?? 0}" oninput="recalcTotals()">
        </div>
        <div class="totals-row grand">
          <span class="t-label">總計</span>
          <span class="t-value" id="sumTotal">${fmtMoney(0)}</span>
        </div>
      </div>
    </div>

    <!-- 報價條件 -->
    <div class="card">
      <div class="card-title">報價條件</div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">報價狀態（quotationStatus）</label>
          <select class="field-select" id="f-quotationStatus">
            ${QSTATUS_ORDER.map(s => `<option value="${s}" ${qStatus===s?'selected':''}>${QSTATUS_LABELS[s]}</option>`).join('')}
          </select>
        </div>
        <div class="field">
          <label class="field-label">報價有效期限（validUntil）</label>
          <input class="field-input" id="f-validUntil" type="date" value="${tsToDateInput(q.validUntil)}">
        </div>
      </div>
      <div class="field-row">
        <div class="field full">
          <label class="field-label">付款條件（paymentTerms）</label>
          <select class="field-select" id="f-paymentTerms" onchange="onPaymentTermsChange()">
            ${PAYMENT_TERMS_PRESETS.map(p => `<option value="${p}" ${(q.paymentTerms||PAYMENT_TERMS_PRESETS[0])===p?'selected':''}>${p}</option>`).join('')}
          </select>
          <input class="field-input" id="f-paymentTermsCustom" type="text" placeholder="輸入自訂付款條件"
                 style="margin-top:8px;display:${ (q.paymentTerms && !PAYMENT_TERMS_PRESETS.slice(0,3).includes(q.paymentTerms)) ? 'block' : 'none'}"
                 value="${ (q.paymentTerms && !PAYMENT_TERMS_PRESETS.slice(0,3).includes(q.paymentTerms)) ? escapeHtml(q.paymentTerms) : ''}">
        </div>
      </div>
      <div class="field-row">
        <div class="field full">
          <label class="field-label">報價備註（quotationNote）</label>
          <textarea class="field-textarea" id="f-quotationNote" placeholder="例如：報價不含後續每年主機/網域續費，需另計…">${escapeHtml(q.quotationNote || '')}</textarea>
        </div>
      </div>
      ${q.quotationUpdatedAt ? `<div style="font-size:11px;color:var(--ink-30);margin-top:4px">上次更新：${fmtDate(q.quotationUpdatedAt)}</div>` : ''}
    </div>

    <div class="save-bar">
      <span class="save-status" id="saveStatus"></span>
      <button class="btn-save" id="saveBtn" onclick="saveQuotation()">儲存正式報價</button>
    </div>`;

  renderItemsTable();
  recalcTotals();

  // 監聽欄位變動，標記 dirty
  ['f-discount','f-tax','f-quotationStatus','f-validUntil','f-paymentTerms','f-paymentTermsCustom','f-quotationNote']
    .forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', markDirty);
    });
}

function onPaymentTermsChange() {
  const sel = document.getElementById('f-paymentTerms');
  const customInput = document.getElementById('f-paymentTermsCustom');
  customInput.style.display = sel.value === '自訂' ? 'block' : 'none';
  markDirty();
}

// ══════════════════════════════════════════════════
//  ITEMS TABLE
// ══════════════════════════════════════════════════
function renderItemsTable() {
  const tbody = document.getElementById('qiTableBody');
  tbody.innerHTML = items.map(item => `
    <tr data-id="${item.id}">
      <td><input class="qi-input" value="${escapeHtml(item.name)}" oninput="updateItem('${item.id}','name',this.value)"></td>
      <td><textarea class="qi-textarea" rows="1" oninput="updateItem('${item.id}','description',this.value)">${escapeHtml(item.description||'')}</textarea></td>
      <td><input class="qi-input num" type="number" min="0" step="1" value="${item.qty}" oninput="updateItem('${item.id}','qty',this.value)"></td>
      <td><input class="qi-input num" type="number" min="0" step="100" value="${item.unitPrice}" oninput="updateItem('${item.id}','unitPrice',this.value)"></td>
      <td class="qi-subtotal">${fmtMoney(item.subtotal)}</td>
      <td><button class="qi-delete-btn" onclick="deleteItem('${item.id}')" title="刪除項目">✕</button></td>
    </tr>`).join('');
}

function updateItem(id, field, value) {
  const item = items.find(i => i.id === id);
  if (!item) return;

  if (field === 'qty' || field === 'unitPrice') {
    item[field] = Number(value) || 0;
    item.subtotal = item.qty * item.unitPrice;
    // 只更新該列小計顯示，不整表重繪（避免輸入時 focus 跳掉）
    const row = document.querySelector(`tr[data-id="${id}"] .qi-subtotal`);
    if (row) row.textContent = fmtMoney(item.subtotal);
  } else {
    item[field] = value;
  }
  recalcTotals();
  markDirty();
}

function addItem() {
  items.push({ id: genItemId(), name: '', description: '', qty: 1, unitPrice: 0, subtotal: 0 });
  renderItemsTable();
  recalcTotals();
  markDirty();
}

function deleteItem(id) {
  items = items.filter(i => i.id !== id);
  renderItemsTable();
  recalcTotals();
  markDirty();
}

// ══════════════════════════════════════════════════
//  TOTALS
// ══════════════════════════════════════════════════
function recalcTotals() {
  const subtotal = items.reduce((sum, i) => sum + (Number(i.subtotal) || 0), 0);
  const discount = Number(document.getElementById('f-discount')?.value || 0);
  const tax      = Number(document.getElementById('f-tax')?.value || 0);
  const total    = subtotal - discount + tax;

  const subtotalEl = document.getElementById('sumSubtotal');
  const totalEl    = document.getElementById('sumTotal');
  if (subtotalEl) subtotalEl.textContent = fmtMoney(subtotal);
  if (totalEl)    totalEl.textContent    = fmtMoney(total);
}

// ══════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════
function tsToDateInput(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function escapeHtml(str) {
  return String(str ?? '').replace(/[&<>"']/g, c => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  }[c]));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

function markDirty() { dirty = true; }

// ══════════════════════════════════════════════════
//  SAVE
// ══════════════════════════════════════════════════
function genActivityId() { return 'act_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8); }

async function saveQuotation() {
  if (!currentId) return;
  const btn = document.getElementById('saveBtn');
  const statusEl = document.getElementById('saveStatus');

  btn.disabled = true;
  statusEl.textContent = '儲存中…';
  statusEl.className = 'save-status saving';

  const subtotal = items.reduce((sum, i) => sum + (Number(i.subtotal) || 0), 0);
  const discount = Number(document.getElementById('f-discount').value || 0);
  const tax      = Number(document.getElementById('f-tax').value || 0);
  const total    = subtotal - discount + tax;

  const validUntilRaw = document.getElementById('f-validUntil').value;
  const paymentTermsSel    = document.getElementById('f-paymentTerms').value;
  const paymentTermsCustom = document.getElementById('f-paymentTermsCustom').value.trim();
  const paymentTerms = (paymentTermsSel === '自訂' && paymentTermsCustom) ? paymentTermsCustom : paymentTermsSel;

  // 清理 items：subtotal 一律重算一次，避免任何不同步
  const cleanItems = items.map(i => ({
    id: i.id,
    name: i.name,
    description: i.description || '',
    qty: Number(i.qty) || 0,
    unitPrice: Number(i.unitPrice) || 0,
    subtotal: (Number(i.qty) || 0) * (Number(i.unitPrice) || 0),
  }));

  const payload = {
    quotationItems:     cleanItems,
    quotationSubtotal:  subtotal,
    quotationDiscount:  discount,
    quotationTax:       tax,
    quotationTotal:     total,
    quotationStatus:    document.getElementById('f-quotationStatus').value,
    paymentTerms:       paymentTerms,
    validUntil:         validUntilRaw ? firebase.firestore.Timestamp.fromDate(new Date(validUntilRaw)) : null,
    quotationNote:      document.getElementById('f-quotationNote').value,
    quotationUpdatedAt: firebase.firestore.FieldValue.serverTimestamp(),
  };

  // 同時在 activityLogs 新增一筆紀錄
  const newLog = {
    id:        genActivityId(),
    type:      'quote',
    content:   `已建立 / 更新正式報價，總金額 ${fmtMoney(total)}`,
    createdAt: firebase.firestore.Timestamp.now(),
    createdBy: 'me',
  };

  try {
    await db.collection('quotes').doc(currentId).update({
      ...payload,
      activityLogs: firebase.firestore.FieldValue.arrayUnion(newLog),
    });

    dirty = false;
    statusEl.textContent = '✓ 已儲存';
    statusEl.className = 'save-status saved';

    // 同步畫面上的狀態 badge
    const badge = document.getElementById('qStatusBadge');
    if (badge) {
      badge.className = `status-badge qstatus-${payload.quotationStatus}`;
      badge.textContent = QSTATUS_LABELS[payload.quotationStatus];
    }

    setTimeout(() => { if (!dirty) statusEl.textContent = ''; }, 2500);
  } catch (err) {
    console.error(err);
    statusEl.textContent = '⚠ 儲存失敗';
    statusEl.className = 'save-status error';
    showToast(`⚠ 儲存失敗：${err.message || err}`);
  } finally {
    btn.disabled = false;
  }
}

window.addEventListener('beforeunload', (e) => {
  if (dirty) { e.preventDefault(); e.returnValue = ''; }
});

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
loadQuote();
</script>
</body>
</html>
